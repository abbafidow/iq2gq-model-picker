<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IQ2GQ 2027 Competition Designer</title>

  <style>
    :root {
      --bg: #07111f;
      --card: #101c2c;
      --card2: #162337;
      --gold: #fbbf24;
      --text: #f9fafb;
      --muted: #cbd5e1;
      --line: #334155;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #fb923c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #10233d, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 22px;
    }

    .wrap { max-width: 1100px; margin: 0 auto; }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }

    .centre { text-align: center; }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    h1 { margin: 0; font-size: 42px; color: var(--gold); }
    h2, h3 { color: var(--gold); margin-top: 0; }

    .subtitle, .explain {
      color: var(--muted);
      line-height: 1.6;
      font-size: 17px;
    }

    .subtitle {
      max-width: 820px;
      margin: 12px auto 24px;
    }

    .rule {
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 14px;
      border-radius: 999px;
      display: inline-block;
      font-weight: 900;
      margin: 12px 0 24px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 14px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #0f172a;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin: 12px 0 28px;
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #fde68a);
    }

    .stage {
      display: inline-block;
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 18px;
    }

    .question {
      font-size: 32px;
      font-weight: 900;
      margin: 10px 0 16px;
      line-height: 1.15;
    }

    .buttons, .choice-grid, .podium, .tile-grid, .blueprint-grid {
      display: grid;
      gap: 16px;
    }

    .buttons { grid-template-columns: 1fr 1fr; }
    .choice-grid, .tile-grid { grid-template-columns: repeat(2, 1fr); }
    .podium, .blueprint-grid { grid-template-columns: repeat(4, 1fr); }

    button, .choice-card, .tile, .blueprint-card, .podium-card {
      border-radius: 18px;
      padding: 18px;
      color: white;
    }

    button {
      border: 0;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
    }

    .choice-card, .tile, .blueprint-card, .podium-card {
      background: #0f172a;
      border: 1px solid var(--line);
    }

    .choice-card {
      cursor: pointer;
      text-align: left;
    }

    .choice-card:hover, .tile:hover { border-color: var(--gold); }

    .choice-icon, .tile-icon { font-size: 36px; margin-bottom: 10px; }

    .choice-title, .tile-title {
      font-size: 21px;
      color: var(--gold);
      margin-bottom: 8px;
      font-weight: 900;
    }

    .choice-text, .tile-text {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.45;
      font-weight: 400;
    }

    .yes { background: linear-gradient(135deg, #15803d, var(--green)); }
    .no { background: linear-gradient(135deg, #991b1b, var(--red)); }
    .goldBtn { background: linear-gradient(135deg, #d97706, var(--gold)); color: #111827; }
    .plain { background: #334155; }

    .small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      margin-top: 6px;
      opacity: 0.9;
    }

    .result-box {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      margin: 18px 0;
    }

    .main-result {
      text-align: center;
      font-size: 34px;
      color: var(--gold);
      font-weight: 900;
      margin: 10px 0;
    }

    .score {
      text-align: center;
      font-size: 19px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .podium-card {
      text-align: center;
      min-height: 120px;
    }

    .podium-card .medal {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .blueprint-card {
      text-align: center;
    }

    .blueprint-card .label {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .blueprint-card .value {
      color: var(--gold);
      font-size: 18px;
      font-weight: 900;
    }

    .gauge-wrap {
      display: flex;
      justify-content: center;
      margin: 16px 0;
    }

    .gauge {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--gold) var(--score), #1e293b 0);
    }

    .gauge-inner {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: #0f172a;
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px solid var(--line);
    }

    .gauge-inner strong {
      color: var(--gold);
      font-size: 26px;
    }

    .profile-row { margin: 14px 0; }

    .profile-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
      font-weight: 900;
    }

    .profile-track {
      height: 10px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }

    .profile-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #fde68a);
    }

    .traffic {
      display: grid;
      gap: 12px;
    }

    .traffic-item {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 12px;
      align-items: center;
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
    }

    .traffic-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    .green { background: var(--green); }
    .yellow { background: var(--gold); }
    .orange { background: var(--orange); }
    .red { background: var(--red); }

    .details {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.55;
    }

    .summary {
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    canvas {
      max-width: 100%;
      margin: 0 auto;
      display: block;
    }

    @media (max-width: 800px) {
      h1 { font-size: 30px; }
      .question { font-size: 25px; }
      .buttons, .choice-grid, .tile-grid, .podium, .blueprint-grid {
        grid-template-columns: 1fr;
      }
      .main-result { font-size: 27px; }
      .logo { width: 95px; height: 95px; }
      .traffic-item { grid-template-columns: 30px 1fr; }
      .traffic-item .score-small { grid-column: 2; }
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="card" id="content"></div>
</div>

<script>
const competitionFormats = {
  team: { icon: "👥", name: "Team Multi Competition", detail: "Teams of 3-4. Every pick must win for the team multi to pay out." },
  individual: { icon: "👤", name: "Individual Competition", detail: "Every member competes on their own performance." },
  matchplay: { icon: "⛳", name: "Match Play Competition", detail: "Members face weekly head-to-head match ups." },
  hybrid: { icon: "⚖️", name: "Hybrid Competition", detail: "One pick contributes to individual, team and syndicate outcomes." }
};

const scoringSystems = {
  weighted: { icon: "🏆", name: "Current Weighted Points", detail: "Keeps win points, loss points, MM points, bonus points and penalties.", scores: { money: 55, consistency: 70, competition: 96, simple: 86, confidence: 45, data: 40, process: 40, accountability: 65 } },
  profit: { icon: "💰", name: "Profit Model", detail: "Ranks members by total money made.", scores: { money: 98, consistency: 40, competition: 45, simple: 85, confidence: 55, data: 50, process: 35, accountability: 70 } },
  roi: { icon: "📈", name: "ROI Model", detail: "Ranks members by return on investment.", scores: { money: 92, consistency: 96, competition: 50, simple: 65, confidence: 45, data: 80, process: 75, accountability: 80 } },
  confidence: { icon: "🔥", name: "Confidence Model", detail: "Members rate confidence. Strong wins help more and strong failures hurt more.", scores: { money: 65, consistency: 60, competition: 82, simple: 55, confidence: 98, data: 55, process: 65, accountability: 85 } },
  elo: { icon: "♟️", name: "Elo Rating Model", detail: "A live rating system based on form, difficulty and results.", scores: { money: 65, consistency: 85, competition: 82, simple: 45, confidence: 60, data: 78, process: 70, accountability: 75 } },
  performanceIndex: { icon: "⭐", name: "Performance Index", detail: "Combines success rate, ROI, profit, MM contribution, form and risk.", scores: { money: 82, consistency: 92, competition: 75, simple: 40, confidence: 60, data: 88, process: 85, accountability: 88 } }
};

const betMethods = {
  equal: { icon: "⚖️", name: "Equal Weighting", detail: "All members submit one pick. Every pick carries the same weight.", scores: { equalInfluence: 100, data: 30, specialist: 20, simple: 95, consensus: 60 } },
  smallGroup: { icon: "👥", name: "Small Group Rotation", detail: "Small groups of 3-4 members build the official syndicate bet each week.", scores: { equalInfluence: 70, data: 35, specialist: 35, simple: 75, consensus: 65 } },
  bestBettor: { icon: "👑", name: "Best Bettor Led", detail: "The strongest current or historical bettor has more influence over the official syndicate bet.", scores: { equalInfluence: 10, data: 75, specialist: 60, simple: 55, consensus: 30 } },
  specialist: { icon: "🎯", name: "Sport Specialist", detail: "Members with the strongest record in a sport or bet type carry more influence for that area.", scores: { equalInfluence: 15, data: 90, specialist: 100, simple: 45, consensus: 45 } },
  consensus: { icon: "🤝", name: "Consensus", detail: "The official bet comes from the strongest area of agreement across members.", scores: { equalInfluence: 75, data: 55, specialist: 50, simple: 70, consensus: 100 } },
  ai: { icon: "🤖", name: "AI Assisted", detail: "AI reviews all member picks, past performance, odds, sport and market type before recommending the strongest syndicate bet.", scores: { equalInfluence: 20, data: 100, specialist: 85, simple: 25, consensus: 65 } }
};

const governanceRules = {
  noConsequence: { icon: "🟢", name: "No Consequence", detail: "Members keep contributing regardless of form.", colour: "green", scores: { accountability: 10, simple: 80, equalInfluence: 90 } },
  strikes: { icon: "🟡", name: "Strike System", detail: "Repeated failed weeks create strikes.", colour: "yellow", scores: { accountability: 75, simple: 85, equalInfluence: 75 } },
  reducedInfluence: { icon: "🟠", name: "Reduced Influence", detail: "Repeated poor performance reduces influence over the syndicate bet.", colour: "orange", scores: { accountability: 90, simple: 45, equalInfluence: 20 } },
  standdown: { icon: "🔴", name: "Stand-down", detail: "Repeated failed weeks trigger a temporary stand-down.", colour: "red", scores: { accountability: 95, simple: 80, equalInfluence: 55 } }
};

const questions = [
  { id: "money", text: "Should Rule #1 be the main priority?", explain: "Choose YES if the system should mainly reward profit. Choose NO if the Presidency race, banter and competition matter just as much.", yes: "consistency", no: "competition", axis: "money", yesText: "YES", yesSmall: "Money first", noText: "NO", noSmall: "Competition matters too" },
  { id: "consistency", text: "Should steady return matter more than one big win?", explain: "Choose YES if consistent returns should be rewarded. Choose NO if total dollars should rank highest.", yes: "process", no: "wildcard", axis: "consistency", yesText: "YES", yesSmall: "Reward consistency", noText: "NO", noSmall: "Total dollars wins" },
  { id: "competition", text: "Should the Presidency race stay central?", explain: "Choose YES if the model should still feel like a season-long competition. Choose NO if the model should mainly help choose better bets.", yes: "simplicity", no: "data", axis: "competition", yesText: "YES", yesSmall: "Keep the race alive", noText: "NO", noSmall: "Focus on better bets" },
  { id: "simplicity", text: "Should the system stay easy to understand?", explain: "Choose YES if members should understand the rules quickly. Choose NO if you are open to a smarter system.", yes: "equalInfluence", no: "confidence", axis: "simple", yesText: "YES", yesSmall: "Keep it simple", noText: "NO", noSmall: "Smarter is fine" },
  { id: "confidence", text: "Should confidence affect the score?", explain: "Choose YES if strong picks should earn more and failed confident picks should hurt more.", yes: "equalInfluence", no: "data", axis: "confidence", yesText: "YES", yesSmall: "Conviction should count", noText: "NO", noSmall: "Keep scoring cleaner" },
  { id: "data", text: "Should past data guide weekly bets?", explain: "Choose YES if member history by sport, betting type, odds and form should influence the official syndicate bet.", yes: "specialist", no: "accountability", axis: "data", yesText: "YES", yesSmall: "Use the data", noText: "NO", noSmall: "Keep it simple" },
  { id: "process", text: "Should good betting decisions be recognised even when they lose?", explain: "Choose YES if process matters. Choose NO if only winning bets should count.", yes: "equalInfluence", no: "wildcard", axis: "process", yesText: "YES", yesSmall: "Reward process", noText: "NO", noSmall: "Only wins count" },
  { id: "equalInfluence", text: "Should every member have equal influence over the syndicate bet?", explain: "Choose YES if every member should carry the same weight. Choose NO if better performers should carry more influence.", yes: "consensus", no: "specialist", axis: "equalInfluence", yesText: "YES", yesSmall: "Equal weight", noText: "NO", noSmall: "Performance should matter" },
  { id: "specialist", text: "Should sport specialists carry more influence?", explain: "Choose YES if members with strong records in certain sports should carry more weight for those bets.", yes: "innovation", no: "consensus", axis: "specialist", yesText: "YES", yesSmall: "Use experts", noText: "NO", noSmall: "Avoid specialists" },
  { id: "consensus", text: "Should the official bet come from group agreement?", explain: "Choose YES if consensus should matter. Choose NO if individual or specialist performance should matter more.", yes: "accountability", no: "innovation", axis: "consensus", yesText: "YES", yesSmall: "Consensus matters", noText: "NO", noSmall: "Performance matters" },
  { id: "innovation", text: "Should the system improve as more data becomes available?", explain: "Choose YES if AI and updated performance data should improve the system over time.", yes: "accountability", no: "wildcard", axis: "innovation", yesText: "YES", yesSmall: "Let it evolve", noText: "NO", noSmall: "Keep rules fixed" },
  { id: "accountability", text: "Should repeated failed weeks reduce a member's role?", explain: "Choose YES if repeated crashes should trigger consequences. Choose NO if everyone should keep contributing regardless of form.", yes: "wildcard", no: "wildcard", axis: "accountability", yesText: "YES", yesSmall: "Consequences matter", noText: "NO", noSmall: "Keep everyone involved" }
];

const defaultPrefs = {
  money: 50, consistency: 50, competition: 50, simple: 50,
  confidence: 50, data: 50, process: 50, equalInfluence: 50,
  specialist: 50, consensus: 50, innovation: 50, accountability: 50
};

let selectedFormat = null;
let questionNumber = 1;
let userPrefs = {};

function intro() {
  document.getElementById("content").innerHTML = `
    <div class="centre">
      <img class="logo" src="IQ2GQ%20Logo.png" alt="IQ2GQ Logo">
      <h1>IQ2GQ 2027 Competition Designer</h1>
      <p class="subtitle">Designing the next chapter of the Syndicate. This tool separates four choices: competition format, scoring system, syndicate bet method and governance rules.</p>
      <div class="rule">Where Intellect Meets Style - Est. 2011</div>
      <p class="subtitle">This is not a binding vote. It supports a clearer AGM discussion.</p>
      <button class="goldBtn" onclick="chooseCompetitionFormat()">Start assessment</button>
    </div>
  `;
}

function chooseCompetitionFormat() {
  const cards = Object.keys(competitionFormats).map(id => {
    const f = competitionFormats[id];
    return `
      <div class="choice-card" onclick="selectCompetitionFormat('${id}')">
        <div class="choice-icon">${f.icon}</div>
        <div class="choice-title">${f.name}</div>
        <div class="choice-text">${f.detail}</div>
      </div>
    `;
  }).join("");

  document.getElementById("content").innerHTML = `
    <div class="stage">STAGE ONE - COMPETITION FORMAT</div>
    <div class="question">How should IQ2GQ be played?</div>
    <div class="explain">Choose your first instinct. The questions that follow will test whether your answers support that format or point somewhere else.</div>
    <div class="choice-grid">${cards}</div>
  `;
}

function selectCompetitionFormat(id) {
  selectedFormat = id;
  userPrefs = { ...defaultPrefs };
  questionNumber = 1;

  if (id === "team") {
    userPrefs.competition = 85;
    userPrefs.equalInfluence = 80;
  }
  if (id === "individual") {
    userPrefs.money = 85;
    userPrefs.competition = 45;
  }
  if (id === "matchplay") {
    userPrefs.competition = 95;
    userPrefs.accountability = 85;
    userPrefs.simple = 75;
  }
  if (id === "hybrid") {
    userPrefs.money = 80;
    userPrefs.competition = 80;
    userPrefs.data = 85;
    userPrefs.innovation = 85;
  }

  showQuestion("money");
}

function showQuestion(id) {
  const q = questions.find(x => x.id === id);
  const total = 12;
  const progress = Math.round((questionNumber - 1) / total * 100);

  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Question ${questionNumber} of ${total}</span>
      <span>${progress}% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:${progress}%"></div></div>
    <div class="stage">STAGE TWO - DESIGN PREFERENCES</div>
    <div class="question">${q.text}</div>
    <div class="explain">${q.explain}</div>
    <div class="buttons">
      <button class="yes" onclick="answer('${q.yes}', '${q.axis}', 100)">${q.yesText}<span class="small">${q.yesSmall}</span></button>
      <button class="no" onclick="answer('${q.no}', '${q.axis}', 0)">${q.noText}<span class="small">${q.noSmall}</span></button>
    </div>
  `;
}

function answer(next, axis, value) {
  userPrefs[axis] = value;
  if (next === "wildcard") {
    showWildcard();
  } else {
    questionNumber++;
    showQuestion(next);
  }
}

function showWildcard() {
  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Final question</span>
      <span>95% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:95%"></div></div>
    <div class="stage">FINAL SCENARIO</div>
    <div class="question">Who had the better season?</div>
    <div class="explain">
      Member A wins 80% of bets, average odds $1.35, and makes $220 profit.<br><br>
      Member B wins 55% of bets, average odds $2.70, and makes $950 profit.
    </div>
    <div class="choice-grid">
      <div class="choice-card" onclick="wildcard('a')">
        <div class="choice-icon">📊</div>
        <div class="choice-title">Member A</div>
        <div class="choice-text">Consistency and high strike rate matter most.</div>
      </div>
      <div class="choice-card" onclick="wildcard('b')">
        <div class="choice-icon">💰</div>
        <div class="choice-title">Member B</div>
        <div class="choice-text">Profit matters most, even with more losses.</div>
      </div>
      <div class="choice-card" onclick="wildcard('neither')">
        <div class="choice-icon">⚖️</div>
        <div class="choice-title">Neither</div>
        <div class="choice-text">There should be a more balanced way to judge performance.</div>
      </div>
    </div>
  `;
}

function wildcard(choice) {
  if (choice === "a") {
    userPrefs.consistency = 100;
    userPrefs.money = Math.max(userPrefs.money, 65);
  }
  if (choice === "b") {
    userPrefs.money = 100;
    userPrefs.consistency = Math.min(userPrefs.consistency, 45);
  }
  if (choice === "neither") {
    userPrefs.data = 90;
    userPrefs.process = 90;
    userPrefs.innovation = 85;
  }
  showResult();
}

function matchAgainst(item, axes) {
  let total = 0;
  axes.forEach(axis => total += 100 - Math.abs(userPrefs[axis] - item.scores[axis]));
  return Math.round(total / axes.length);
}

function rankItems(items, axes) {
  return Object.keys(items)
    .map(id => ({ id, ...items[id], match: matchAgainst(items[id], axes) }))
    .sort((a, b) => b.match - a.match);
}

function rankCompetitionFormats() {
  const formatScores = {
    team: { scores: { competition: 90, simple: 75, equalInfluence: 85, consensus: 70, data: 40, accountability: 65 } },
    individual: { scores: { competition: 45, simple: 80, equalInfluence: 60, consensus: 30, data: 65, accountability: 75 } },
    matchplay: { scores: { competition: 98, simple: 75, equalInfluence: 70, consensus: 40, data: 55, accountability: 90 } },
    hybrid: { scores: { competition: 85, simple: 45, equalInfluence: 55, consensus: 65, data: 90, accountability: 80 } }
  };

  return Object.keys(competitionFormats)
    .map(id => ({ id, ...competitionFormats[id], match: matchAgainst(formatScores[id], ["competition", "simple", "equalInfluence", "consensus", "data", "accountability"]) }))
    .sort((a, b) => b.match - a.match);
}

function showResult() {
  const formatRank = rankCompetitionFormats();
  const scoringRank = rankItems(scoringSystems, ["money", "consistency", "competition", "simple", "confidence", "data", "process", "accountability"]);
  const betRank = rankItems(betMethods, ["equalInfluence", "data", "specialist", "simple", "consensus"]);
  const governanceRank = rankItems(governanceRules, ["accountability", "simple", "equalInfluence"]);

  const topFormat = formatRank[0];
  const topScoring = scoringRank[0];
  const topBet = betRank[0];
  const topGovernance = governanceRank[0];

  const profile = {
    "Profit orientation": Math.round((userPrefs.money + userPrefs.consistency) / 2),
    "Competition focus": userPrefs.competition,
    "Data and innovation": Math.round((userPrefs.data + userPrefs.innovation) / 2),
    "Simplicity": userPrefs.simple,
    "Equal influence": userPrefs.equalInfluence,
    "Specialist weighting": userPrefs.specialist,
    "Consensus": userPrefs.consensus,
    "Accountability": userPrefs.accountability
  };

  const profileHtml = Object.keys(profile).map(key => `
    <div class="profile-row">
      <div class="profile-head"><span>${key}</span><span>${profile[key]}%</span></div>
      <div class="profile-track"><div class="profile-fill" style="width:${profile[key]}%"></div></div>
    </div>
  `).join("");

  const summary = `IQ2GQ 2027 Competition Designer

Competition Format: ${topFormat.name} (${topFormat.match}%)
Scoring System: ${topScoring.name} (${topScoring.match}%)
Syndicate Bet Method: ${topBet.name} (${topBet.match}%)
Governance Rule: ${topGovernance.name} (${topGovernance.match}%)

AGM focus:
Decide the format first, then the scoring system, then how the official syndicate bet should be built.`;

  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Result</span>
      <span>100% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:100%"></div></div>

    <div class="centre">
      <h1>Your IQ2GQ Design</h1>
      <p class="subtitle">A suggested design based on your answers. Use this to guide discussion, not as a binding vote.</p>
    </div>

    <div class="result-box">
      <h2>Blueprint Summary</h2>
      <div class="blueprint-grid">
        <div class="blueprint-card">
          <div class="label">Competition</div>
          <div class="value">${topFormat.icon}<br>${topFormat.name}</div>
        </div>
        <div class="blueprint-card">
          <div class="label">Scoring</div>
          <div class="value">${topScoring.icon}<br>${topScoring.name}</div>
        </div>
        <div class="blueprint-card">
          <div class="label">Bet Method</div>
          <div class="value">${topBet.icon}<br>${topBet.name}</div>
        </div>
        <div class="blueprint-card">
          <div class="label">Governance</div>
          <div class="value">${topGovernance.icon}<br>${topGovernance.name}</div>
        </div>
      </div>
    </div>

    <div class="result-box">
      <h2>Overall Fit</h2>
      <div class="gauge-wrap">
        <div class="gauge" style="--score:${topScoring.match}%">
          <div class="gauge-inner">
            <div><strong>${topScoring.match}%</strong><br>Scoring fit</div>
          </div>
        </div>
      </div>
      <p class="centre subtitle">Your strongest scoring system match is ${topScoring.name}.</p>
    </div>

    <div class="result-box">
      <h2>Top Recommendations</h2>
      <div class="podium">
        <div class="podium-card"><div class="medal">1</div><strong>Format</strong><br>${topFormat.name}<br>${topFormat.match}%</div>
        <div class="podium-card"><div class="medal">2</div><strong>Scoring</strong><br>${topScoring.name}<br>${topScoring.match}%</div>
        <div class="podium-card"><div class="medal">3</div><strong>Bet Method</strong><br>${topBet.name}<br>${topBet.match}%</div>
        <div class="podium-card"><div class="medal">4</div><strong>Governance</strong><br>${topGovernance.name}<br>${topGovernance.match}%</div>
      </div>
    </div>

    <div class="result-box">
      <h2>Betting Philosophy Radar</h2>
      <canvas id="radar" width="520" height="420"></canvas>
    </div>

    <div class="result-box">
      <h2>Betting Philosophy Profile</h2>
      ${profileHtml}
    </div>

    <div class="result-box">
      <h2>Competition Format Tiles</h2>
      <div class="tile-grid">${makeTiles(formatRank)}</div>
    </div>

    <div class="result-box">
      <h2>Scoring System Tiles</h2>
      <div class="tile-grid">${makeTiles(scoringRank)}</div>
    </div>

    <div class="result-box">
      <h2>Syndicate Bet Method Matrix</h2>
      <div class="tile-grid">${makeTiles(betRank)}</div>
    </div>

    <div class="result-box">
      <h2>Governance Traffic Lights</h2>
      <div class="traffic">${makeTraffic(governanceRank)}</div>
    </div>

    <div class="result-box">
      <h2>AGM-style recommendation</h2>
      <p>Discuss these choices separately. The syndicate can choose one Competition Format, one Scoring System, one Syndicate Bet Method and one Governance Rule.</p>
      <p>Based on your answers, your strongest design is: <strong>${topFormat.name}</strong> with <strong>${topScoring.name}</strong>, using <strong>${topBet.name}</strong>, supported by <strong>${topGovernance.name}</strong>.</p>
    </div>

    <div class="result-box">
      <h2>Copy this result</h2>
      <div class="summary" id="summary">${summary}</div>
    </div>

    <div class="buttons">
      <button class="plain" onclick="intro()">Start again</button>
      <button class="goldBtn" onclick="copyResult()">Copy result</button>
    </div>
  `;

  drawRadar();
}

function makeTiles(items) {
  return items.map((m, i) => `
    <div class="tile" onclick="toggleDetails('tile-${m.id}-${i}')">
      <div class="tile-icon">${m.icon}</div>
      <div class="tile-title">${i + 1}. ${m.name}</div>
      <div class="tile-text">${m.match}% match<br><br>${m.detail}</div>
      <div class="details" id="tile-${m.id}-${i}">
        <strong>Why this appears here:</strong> This option aligns with your answers across the relevant design questions.
      </div>
    </div>
  `).join("");
}

function makeTraffic(items) {
  return items.map((m, i) => `
    <div class="traffic-item" onclick="toggleDetails('traffic-${m.id}-${i}')">
      <div class="traffic-dot ${m.colour || 'yellow'}"></div>
      <div><strong>${m.name}</strong><br><span class="tile-text">${m.detail}</span>
        <div class="details" id="traffic-${m.id}-${i}">Match: ${m.match}%. This reflects your appetite for accountability, simplicity and equal influence.</div>
      </div>
      <div class="score-small">${m.match}%</div>
    </div>
  `).join("");
}

function drawRadar() {
  const canvas = document.getElementById("radar");
  if (!canvas) return;

  const ctx = canvas.getContext("2d");
  const axes = ["money", "competition", "data", "simple", "accountability"];
  const labels = ["Profit", "Competition", "Data", "Simplicity", "Accountability"];
  const cx = canvas.width / 2;
  const cy = canvas.height / 2 + 10;
  const radius = 145;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#334155";
  ctx.fillStyle = "#cbd5e1";
  ctx.lineWidth = 1;
  ctx.font = "14px Arial";

  for (let ring = 1; ring <= 5; ring++) {
    ctx.beginPath();
    axes.forEach((axis, i) => {
      const angle = -Math.PI / 2 + (i * 2 * Math.PI / axes.length);
      const r = radius * ring / 5;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.stroke();
  }

  axes.forEach((axis, i) => {
    const angle = -Math.PI / 2 + (i * 2 * Math.PI / axes.length);
    const x = cx + Math.cos(angle) * (radius + 45);
    const y = cy + Math.sin(angle) * (radius + 45);
    ctx.fillText(labels[i], x - 38, y);
  });

  drawShape(axes.map(a => userPrefs[a]), "rgba(251,191,36,0.35)", "#fbbf24");
}

function drawShape(values, fill, stroke) {
  const canvas = document.getElementById("radar");
  const ctx = canvas.getContext("2d");
  const axes = values.length;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2 + 10;
  const radius = 145;

  ctx.beginPath();
  values.forEach((value, i) => {
    const angle = -Math.PI / 2 + (i * 2 * Math.PI / axes);
    const r = radius * value / 100;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 3;
  ctx.stroke();
}

function toggleDetails(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function copyResult() {
  const text = document.getElementById("summary").innerText;
  navigator.clipboard.writeText(text);
  alert("Result copied.");
}

intro();
</script>
