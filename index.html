<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IQ2GQ 2027 Competition Designer</title>

  <style>
    :root {
      --bg: #07111f;
      --card: #101c2c;
      --card2: #162337;
      --gold: #fbbf24;
      --text: #f9fafb;
      --muted: #cbd5e1;
      --line: #334155;
      --green: #22c55e;
      --red: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #10233d, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 22px;
    }

    .wrap { max-width: 1040px; margin: 0 auto; }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }

    .centre { text-align: center; }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    h1 { margin: 0; font-size: 42px; color: var(--gold); }
    h2, h3 { color: var(--gold); margin-top: 0; }

    .subtitle {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
      max-width: 800px;
      margin: 12px auto 24px;
    }

    .rule {
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 14px;
      border-radius: 999px;
      display: inline-block;
      font-weight: 900;
      margin: 12px 0 24px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 14px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #0f172a;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin: 12px 0 28px;
    }

    .fill, .rank-fill, .profile-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #fde68a);
    }

    .stage {
      display: inline-block;
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 18px;
    }

    .question {
      font-size: 32px;
      font-weight: 900;
      margin: 10px 0 16px;
      line-height: 1.15;
    }

    .explain {
      color: var(--muted);
      line-height: 1.6;
      font-size: 17px;
      margin-bottom: 26px;
    }

    .buttons, .choice-grid, .podium {
      display: grid;
      gap: 16px;
    }

    .buttons { grid-template-columns: 1fr 1fr; }
    .choice-grid { grid-template-columns: repeat(2, 1fr); }
    .podium { grid-template-columns: repeat(3, 1fr); }

    button, .choice-card {
      border: 0;
      border-radius: 18px;
      padding: 18px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      color: white;
    }

    .choice-card {
      background: #0f172a;
      border: 1px solid var(--line);
      text-align: left;
    }

    .choice-card:hover { border-color: var(--gold); }

    .choice-icon { font-size: 36px; margin-bottom: 10px; }

    .choice-title {
      font-size: 21px;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .choice-text {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.45;
      font-weight: 400;
    }

    .yes { background: linear-gradient(135deg, #15803d, var(--green)); }
    .no { background: linear-gradient(135deg, #991b1b, var(--red)); }
    .goldBtn { background: linear-gradient(135deg, #d97706, var(--gold)); color: #111827; }
    .plain { background: #334155; }

    .small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      margin-top: 6px;
      opacity: 0.9;
    }

    .result-title {
      text-align: center;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 18px;
    }

    .main-result {
      text-align: center;
      font-size: 34px;
      color: var(--gold);
      font-weight: 900;
      margin: 10px 0;
    }

    .score {
      text-align: center;
      font-size: 19px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .result-box {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      margin: 18px 0;
    }

    .rank-list { display: grid; gap: 12px; }

    .rank-item {
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
    }

    .rank-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .rank-bar, .profile-bar {
      height: 10px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }

    .details {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.55;
    }

    .details strong { color: white; }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      font-size: 12px;
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 9px;
    }

    .podium-card {
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .podium-card .icon {
      font-size: 34px;
      margin-bottom: 8px;
    }

    .profile-row { margin: 14px 0; }

    .profile-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
      font-weight: 900;
    }

    .summary {
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 750px) {
      h1 { font-size: 30px; }
      .question { font-size: 25px; }
      .buttons, .choice-grid, .podium { grid-template-columns: 1fr; }
      .main-result { font-size: 27px; }
      .logo { width: 95px; height: 95px; }
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="card" id="content"></div>
</div>

<script>
const competitionFormats = {
  team: {
    icon: "👥",
    name: "Team Multi Competition",
    short: "Teams of 3-4. Every pick must win for the team multi to pay out.",
    detail: "Best for camaraderie, banter, shared wins, shared blame and the current IQ2GQ feel."
  },
  individual: {
    icon: "👤",
    name: "Individual Competition",
    short: "Every member competes on their own performance.",
    detail: "Best for profit models, ROI and identifying the strongest bettor without relying on teammates."
  },
  matchplay: {
    icon: "⛳",
    name: "Match Play Competition",
    short: "Members face weekly head-to-head match ups.",
    detail: "Best for rivalry, weekly drama and a Ryder Cup style season narrative."
  },
  hybrid: {
    icon: "⚖️",
    name: "Hybrid Competition",
    short: "One pick contributes to individual, team and syndicate outcomes.",
    detail: "Best if IQ2GQ wants to preserve the social competition while adding smarter data-led betting."
  }
};

const scoringSystems = {
  weighted: {
    icon: "🏆",
    name: "Current Weighted Points",
    detail: "Keeps win points, loss points, MM points, bonus points and penalties.",
    scores: { money: 55, consistency: 70, competition: 96, simple: 86, confidence: 45, data: 40, process: 40, accountability: 65 }
  },
  profit: {
    icon: "💰",
    name: "Profit Model",
    detail: "Ranks members by total money made.",
    scores: { money: 98, consistency: 40, competition: 45, simple: 85, confidence: 55, data: 50, process: 35, accountability: 70 }
  },
  roi: {
    icon: "📈",
    name: "ROI Model",
    detail: "Ranks members by return on investment.",
    scores: { money: 92, consistency: 96, competition: 50, simple: 65, confidence: 45, data: 80, process: 75, accountability: 80 }
  },
  confidence: {
    icon: "🔥",
    name: "Confidence Model",
    detail: "Members rate confidence. Strong wins help more and strong failures hurt more.",
    scores: { money: 65, consistency: 60, competition: 82, simple: 55, confidence: 98, data: 55, process: 65, accountability: 85 }
  },
  elo: {
    icon: "♟️",
    name: "Elo Rating Model",
    detail: "A live rating system based on form, difficulty and results.",
    scores: { money: 65, consistency: 85, competition: 82, simple: 45, confidence: 60, data: 78, process: 70, accountability: 75 }
  },
  performanceIndex: {
    icon: "⭐",
    name: "Performance Index",
    detail: "Combines success rate, ROI, profit, MM contribution, form and risk.",
    scores: { money: 82, consistency: 92, competition: 75, simple: 40, confidence: 60, data: 88, process: 85, accountability: 88 }
  }
};

const betMethods = {
  equal: {
    icon: "⚖️",
    name: "Equal Weighting",
    detail: "All members submit one pick. Every pick carries the same weight.",
    scores: { equalInfluence: 100, data: 30, specialist: 20, simple: 95, consensus: 60 }
  },
  smallGroup: {
    icon: "👥",
    name: "Small Group Rotation",
    detail: "Small groups of 3-4 members build the official syndicate bet each week.",
    scores: { equalInfluence: 70, data: 35, specialist: 35, simple: 75, consensus: 65 }
  },
  bestBettor: {
    icon: "👑",
    name: "Best Bettor Led",
    detail: "The strongest current or historical bettor has more influence over the official syndicate bet.",
    scores: { equalInfluence: 10, data: 75, specialist: 60, simple: 55, consensus: 30 }
  },
  specialist: {
    icon: "🎯",
    name: "Sport Specialist",
    detail: "Members with the strongest record in a sport or bet type carry more influence for that area.",
    scores: { equalInfluence: 15, data: 90, specialist: 100, simple: 45, consensus: 45 }
  },
  consensus: {
    icon: "🤝",
    name: "Consensus",
    detail: "The official bet comes from the strongest area of agreement across members.",
    scores: { equalInfluence: 75, data: 55, specialist: 50, simple: 70, consensus: 100 }
  },
  ai: {
    icon: "🤖",
    name: "AI Assisted",
    detail: "AI reviews all member picks, past performance, odds, sport and market type before recommending the strongest syndicate bet.",
    scores: { equalInfluence: 20, data: 100, specialist: 85, simple: 25, consensus: 65 }
  }
};

const governanceRules = {
  noConsequence: {
    icon: "🟢",
    name: "No Consequence",
    detail: "Members keep contributing regardless of form.",
    scores: { accountability: 10, simple: 80, equalInfluence: 90 }
  },
  strikes: {
    icon: "⚠️",
    name: "Strike System",
    detail: "Repeated failed weeks create strikes.",
    scores: { accountability: 75, simple: 85, equalInfluence: 75 }
  },
  standdown: {
    icon: "🛑",
    name: "Stand-down",
    detail: "Repeated failed weeks trigger a temporary stand-down.",
    scores: { accountability: 95, simple: 80, equalInfluence: 55 }
  },
  reducedInfluence: {
    icon: "📉",
    name: "Reduced Influence",
    detail: "Repeated poor performance reduces influence over the syndicate bet.",
    scores: { accountability: 90, simple: 45, equalInfluence: 20 }
  },
  captainOverride: {
    icon: "🧭",
    name: "Captain Override",
    detail: "A captain or performance lead can veto high-risk or weak picks.",
    scores: { accountability: 85, simple: 55, equalInfluence: 25 }
  }
};

const questions = [
  {
    id: "money",
    text: "Should Rule #1 be the main priority?",
    explain: "Choose YES if the system should mainly reward profit. Choose NO if the Presidency race, banter and competition matter just as much.",
    yes: "consistency", no: "competition", axis: "money",
    yesText: "YES", yesSmall: "Money first", noText: "NO", noSmall: "Competition matters too"
  },
  {
    id: "consistency",
    text: "Should steady return matter more than one big win?",
    explain: "Choose YES if consistent returns should be rewarded. Choose NO if total dollars should rank highest.",
    yes: "process", no: "wildcard", axis: "consistency",
    yesText: "YES", yesSmall: "Reward consistency", noText: "NO", noSmall: "Total dollars wins"
  },
  {
    id: "competition",
    text: "Should the Presidency race stay central?",
    explain: "Choose YES if the model should still feel like a season-long competition. Choose NO if the model should mainly help choose better bets.",
    yes: "simplicity", no: "data", axis: "competition",
    yesText: "YES", yesSmall: "Keep the race alive", noText: "NO", noSmall: "Focus on better bets"
  },
  {
    id: "simplicity",
    text: "Should the system stay easy to understand?",
    explain: "Choose YES if members should understand the rules quickly. Choose NO if you are open to a smarter system that needs more explanation.",
    yes: "equalInfluence", no: "confidence", axis: "simple",
    yesText: "YES", yesSmall: "Keep it simple", noText: "NO", noSmall: "Smarter is fine"
  },
  {
    id: "confidence",
    text: "Should confidence affect the score?",
    explain: "Choose YES if strong picks should earn more and failed confident picks should hurt more.",
    yes: "equalInfluence", no: "data", axis: "confidence",
    yesText: "YES", yesSmall: "Conviction should count", noText: "NO", noSmall: "Keep scoring cleaner"
  },
  {
    id: "data",
    text: "Should past data guide weekly bets?",
    explain: "Choose YES if member history by sport, betting type, odds and form should influence the official syndicate bet.",
    yes: "specialist", no: "accountability", axis: "data",
    yesText: "YES", yesSmall: "Use the data", noText: "NO", noSmall: "Keep it simple"
  },
  {
    id: "process",
    text: "Should good betting decisions be recognised even when they lose?",
    explain: "Choose YES if process matters. Choose NO if only winning bets should count.",
    yes: "equalInfluence", no: "wildcard", axis: "process",
    yesText: "YES", yesSmall: "Reward good process", noText: "NO", noSmall: "Only wins count"
  },
  {
    id: "equalInfluence",
    text: "Should every member have equal influence over the syndicate bet?",
    explain: "Choose YES if every member should carry the same weight. Choose NO if better performers should carry more influence.",
    yes: "consensus", no: "specialist", axis: "equalInfluence",
    yesText: "YES", yesSmall: "Equal weight", noText: "NO", noSmall: "Performance should matter"
  },
  {
    id: "specialist",
    text: "Should sport specialists carry more influence?",
    explain: "Choose YES if members with strong records in NRL, NFL, Rugby or other sports should carry more weight for those bets.",
    yes: "innovation", no: "consensus", axis: "specialist",
    yesText: "YES", yesSmall: "Use experts", noText: "NO", noSmall: "Avoid specialists"
  },
  {
    id: "consensus",
    text: "Should the official bet come from group agreement?",
    explain: "Choose YES if consensus should matter. Choose NO if individual or specialist performance should matter more.",
    yes: "accountability", no: "innovation", axis: "consensus",
    yesText: "YES", yesSmall: "Consensus matters", noText: "NO", noSmall: "Performance matters more"
  },
  {
    id: "innovation",
    text: "Should the system improve as more data becomes available?",
    explain: "Choose YES if AI and updated performance data should improve the system over time.",
    yes: "accountability", no: "wildcard", axis: "innovation",
    yesText: "YES", yesSmall: "Let it evolve", noText: "NO", noSmall: "Keep rules fixed"
  },
  {
    id: "accountability",
    text: "Should repeated failed weeks reduce a member's role?",
    explain: "Choose YES if repeated crashes should trigger consequences. Choose NO if everyone should keep contributing regardless of form.",
    yes: "wildcard", no: "wildcard", axis: "accountability",
    yesText: "YES", yesSmall: "Consequences matter", noText: "NO", noSmall: "Keep everyone involved"
  }
];

let selectedFormat = null;
let questionNumber = 1;

let userPrefs = {};

const defaultPrefs = {
  money: 50,
  consistency: 50,
  competition: 50,
  simple: 50,
  confidence: 50,
  data: 50,
  process: 50,
  equalInfluence: 50,
  specialist: 50,
  consensus: 50,
  innovation: 50,
  accountability: 50
};

function intro() {
  document.getElementById("content").innerHTML = `
    <div class="centre">
      <img class="logo" src="IQ2GQ%20Logo.png" alt="IQ2GQ Logo">
      <h1>IQ2GQ 2027 Competition Designer</h1>
      <p class="subtitle">Designing the next chapter of the Syndicate. This tool separates four choices: competition format, scoring system, syndicate bet method and governance rules.</p>
      <div class="rule">Where Intellect Meets Style - Est. 2011</div>
      <p class="subtitle">This is not a binding vote. It is designed to support a clearer AGM discussion.</p>
      <button class="goldBtn" onclick="chooseCompetitionFormat()">Start assessment</button>
    </div>
  `;
}

function chooseCompetitionFormat() {
  const cards = Object.keys(competitionFormats).map(id => {
    const f = competitionFormats[id];
    return `
      <div class="choice-card" onclick="selectCompetitionFormat('${id}')">
        <div class="choice-icon">${f.icon}</div>
        <div class="choice-title">${f.name}</div>
        <div class="choice-text">${f.short}<br><br>${f.detail}</div>
      </div>
    `;
  }).join("");

  document.getElementById("content").innerHTML = `
    <div class="stage">STAGE ONE - COMPETITION FORMAT</div>
    <div class="question">How should IQ2GQ be played?</div>
    <div class="explain">Choose your first instinct. The questions that follow will test whether your answers support that format or point somewhere else.</div>
    <div class="choice-grid">${cards}</div>
  `;
}

function selectCompetitionFormat(id) {
  selectedFormat = id;
  userPrefs = { ...defaultPrefs };
  questionNumber = 1;

  if (id === "team") {
    userPrefs.competition = 85;
    userPrefs.equalInfluence = 80;
  }

  if (id === "individual") {
    userPrefs.money = 85;
    userPrefs.competition = 45;
  }

  if (id === "matchplay") {
    userPrefs.competition = 95;
    userPrefs.accountability = 85;
    userPrefs.simple = 75;
  }

  if (id === "hybrid") {
    userPrefs.money = 80;
    userPrefs.competition = 80;
    userPrefs.data = 85;
    userPrefs.innovation = 85;
  }

  showQuestion("money");
}

function showQuestion(id) {
  const q = questions.find(x => x.id === id);
  const total = 12;
  const progress = Math.round((questionNumber - 1) / total * 100);

  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Question ${questionNumber} of ${total}</span>
      <span>${progress}% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:${progress}%"></div></div>
    <div class="stage">STAGE TWO - DESIGN PREFERENCES</div>
    <div class="question">${q.text}</div>
    <div class="explain">${q.explain}</div>
    <div class="buttons">
      <button class="yes" onclick="answer('${q.yes}', '${q.axis}', 100)">${q.yesText}<span class="small">${q.yesSmall}</span></button>
      <button class="no" onclick="answer('${q.no}', '${q.axis}', 0)">${q.noText}<span class="small">${q.noSmall}</span></button>
    </div>
  `;
}

function answer(next, axis, value) {
  userPrefs[axis] = value;

  if (next === "wildcard") {
    showWildcard();
  } else {
    questionNumber++;
    showQuestion(next);
  }
}

function showWildcard() {
  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Final question</span>
      <span>95% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:95%"></div></div>
    <div class="stage">FINAL SCENARIO</div>
    <div class="question">Who had the better season?</div>
    <div class="explain">
      Member A wins 80% of bets, average odds $1.35, and makes $220 profit.<br><br>
      Member B wins 55% of bets, average odds $2.70, and makes $950 profit.
    </div>
    <div class="choice-grid">
      <div class="choice-card" onclick="wildcard('a')">
        <div class="choice-icon">📊</div>
        <div class="choice-title">Member A</div>
        <div class="choice-text">Consistency and high strike rate matter most.</div>
      </div>
      <div class="choice-card" onclick="wildcard('b')">
        <div class="choice-icon">💰</div>
        <div class="choice-title">Member B</div>
        <div class="choice-text">Profit matters most, even with more losses.</div>
      </div>
      <div class="choice-card" onclick="wildcard('neither')">
        <div class="choice-icon">⚖️</div>
        <div class="choice-title">Neither</div>
        <div class="choice-text">There should be a more balanced way to judge performance.</div>
      </div>
    </div>
  `;
}

function wildcard(choice) {
  if (choice === "a") {
    userPrefs.consistency = 100;
    userPrefs.money = Math.max(userPrefs.money, 65);
  }

  if (choice === "b") {
    userPrefs.money = 100;
    userPrefs.consistency = Math.min(userPrefs.consistency, 45);
  }

  if (choice === "neither") {
    userPrefs.data = 90;
    userPrefs.process = 90;
    userPrefs.innovation = 85;
  }

  showResult();
}

function matchAgainst(item, axes) {
  let total = 0;
  axes.forEach(axis => total += 100 - Math.abs(userPrefs[axis] - item.scores[axis]));
  return Math.round(total / axes.length);
}

function rankItems(items, axes) {
  return Object.keys(items)
    .map(id => ({ id, ...items[id], match: matchAgainst(items[id], axes) }))
    .sort((a, b) => b.match - a.match);
}

function rankCompetitionFormats() {
  const formatScores = {
    team: {
      scores: {
        competition: 90,
        simple: 75,
        equalInfluence: 85,
        consensus: 70,
        data: 40,
        accountability: 65
      }
    },
    individual: {
      scores: {
        competition: 45,
        simple: 80,
        equalInfluence: 60,
        consensus: 30,
        data: 65,
        accountability: 75
      }
    },
    matchplay: {
      scores: {
        competition: 98,
        simple: 75,
        equalInfluence: 70,
        consensus: 40,
        data: 55,
        accountability: 90
      }
    },
    hybrid: {
      scores: {
        competition: 85,
        simple: 45,
        equalInfluence: 55,
        consensus: 65,
        data: 90,
        accountability: 80
      }
    }
  };

  return Object.keys(competitionFormats)
    .map(id => ({
      id,
      ...competitionFormats[id],
      match: matchAgainst(formatScores[id], ["competition", "simple", "equalInfluence", "consensus", "data", "accountability"])
    }))
    .sort((a, b) => b.match - a.match);
}

function showResult() {
  const formatRank = rankCompetitionFormats();
  const scoringRank = rankItems(scoringSystems, ["money", "consistency", "competition", "simple", "confidence", "data", "process", "accountability"]);
  const betRank = rankItems(betMethods, ["equalInfluence", "data", "specialist", "simple", "consensus"]);
  const governanceRank = rankItems(governanceRules, ["accountability", "simple", "equalInfluence"]);

  const topFormat = formatRank[0];
  const topScoring = scoringRank[0];
  const topBet = betRank[0];
  const topGovernance = governanceRank[0];

  const profile = {
    "Profit orientation": Math.round((userPrefs.money + userPrefs.consistency) / 2),
    "Competition focus": userPrefs.competition,
    "Data and innovation": Math.round((userPrefs.data + userPrefs.innovation) / 2),
    "Simplicity": userPrefs.simple,
    "Equal influence": userPrefs.equalInfluence,
    "Specialist weighting": userPrefs.specialist,
    "Consensus": userPrefs.consensus,
    "Accountability": userPrefs.accountability
  };

  const profileHtml = Object.keys(profile).map(key => `
    <div class="profile-row">
      <div class="profile-head"><span>${key}</span><span>${profile[key]}%</span></div>
      <div class="profile-bar"><div class="profile-fill" style="width:${profile[key]}%"></div></div>
    </div>
  `).join("");

  const formatHtml = makeRankList(formatRank);
  const scoringHtml = makeRankList(scoringRank);
  const betHtml = makeRankList(betRank);
  const governanceHtml = makeRankList(governanceRank);

  const summary = `IQ2GQ 2027 Competition Designer

Competition Format: ${topFormat.name} (${topFormat.match}%)
Scoring System: ${topScoring.name} (${topScoring.match}%)
Syndicate Bet Method: ${topBet.name} (${topBet.match}%)
Governance Rule: ${topGovernance.name} (${topGovernance.match}%)

AGM focus:
Decide the format first, then the scoring system, then how the official syndicate bet should be built.`;

  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Result</span>
      <span>100% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:100%"></div></div>

    <div class="result-title">Your IQ2GQ design</div>

    <div class="main-result">${topFormat.icon} ${topFormat.name}</div>
    <div class="score">Competition Format - ${topFormat.match}% match</div>

    <div class="main-result">${topScoring.icon} ${topScoring.name}</div>
    <div class="score">Scoring System - ${topScoring.match}% match</div>

    <div class="main-result">${topBet.icon} ${topBet.name}</div>
    <div class="score">Syndicate Bet Method - ${topBet.match}% match</div>

    <div class="main-result">${topGovernance.icon} ${topGovernance.name}</div>
    <div class="score">Governance Rule - ${topGovernance.match}% match</div>

    <div class="podium">
      <div class="podium-card"><div class="icon">1</div><strong>Format</strong><br>${topFormat.name}</div>
      <div class="podium-card"><div class="icon">2</div><strong>Scoring</strong><br>${topScoring.name}</div>
      <div class="podium-card"><div class="icon">3</div><strong>Bet Method</strong><br>${topBet.name}</div>
    </div>

    <div class="result-box">
      <h2>Betting philosophy profile</h2>
      ${profileHtml}
    </div>

    <div class="result-box">
      <h2>Competition Format rankings</h2>
      <p class="explain">This compares your answers against the four competition formats. Your first choice was also considered, but your answers may point to a different format.</p>
      <div class="rank-list">${formatHtml}</div>
    </div>

    <div class="result-box">
      <h2>Scoring System rankings</h2>
      <p class="explain">This shows how members should be ranked or how the President could be determined.</p>
      <div class="rank-list">${scoringHtml}</div>
    </div>

    <div class="result-box">
      <h2>Syndicate Bet Method rankings</h2>
      <p class="explain">This shows how the official IQ2GQ syndicate bet could be built from members' picks.</p>
      <div class="rank-list">${betHtml}</div>
    </div>

    <div class="result-box">
      <h2>Governance Rule rankings</h2>
      <p class="explain">This shows how repeated poor performance or high-risk behaviour could be managed.</p>
      <div class="rank-list">${governanceHtml}</div>
    </div>

    <div class="result-box">
      <h2>AGM-style recommendation</h2>
      <p>Discuss these choices separately. The syndicate does not need to adopt one bundled model. It can choose one Competition Format, one Scoring System, one Syndicate Bet Method and one Governance Rule.</p>
      <p>Based on your answers, your strongest design is: <strong>${topFormat.name}</strong> with <strong>${topScoring.name}</strong>, using <strong>${topBet.name}</strong>, supported by <strong>${topGovernance.name}</strong>.</p>
    </div>

    <div class="result-box">
      <h2>Copy this result</h2>
      <div class="summary" id="summary">${summary}</div>
    </div>

    <div class="buttons">
      <button class="plain" onclick="intro()">Start again</button>
      <button class="goldBtn" onclick="copyResult()">Copy result</button>
    </div>
  `;
}

function makeRankList(items) {
  return items.map((m, i) => `
    <div class="rank-item" onclick="toggleDetails('${m.id}')">
      <div class="rank-head">
        <span>${i + 1}. ${m.icon} ${m.name}</span>
        <span>${m.match}%</span>
      </div>
      <div class="rank-bar"><div class="rank-fill" style="width:${m.match}%"></div></div>
      <div class="details" id="details-${m.id}">
        <p><strong>What it is:</strong> ${m.detail}</p>
      </div>
    </div>
  `).join("");
}

function toggleDetails(id) {
  const el = document.getElementById(`details-${id}`);
  if (!el) return;
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function copyResult() {
  const text = document.getElementById("summary").innerText;
  navigator.clipboard.writeText(text);
  alert("Result copied.");
}

intro();
</script>
</body>
</html>
