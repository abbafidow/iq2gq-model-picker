<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IQ2GQ Betting Model Picker</title>
  <style>
    :root {
      --bg: #07111f;
      --card: #101c2c;
      --card2: #162337;
      --gold: #fbbf24;
      --green: #22c55e;
      --red: #ef4444;
      --text: #f9fafb;
      --muted: #cbd5e1;
      --line: #334155;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #10233d, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap { max-width: 950px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 26px;
    }

    .logo {
      width: 72px;
      height: 72px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--gold);
      font-weight: 900;
      font-size: 24px;
    }

    h1 { margin: 0; font-size: 34px; }
    .subtitle { margin: 6px 0 0; color: var(--muted); }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .bar, .mini-bar, .rank-bar {
      background: #0f172a;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .bar { height: 12px; margin-bottom: 28px; }
    .fill, .mini-fill, .rank-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #fde68a);
    }

    .tag {
      display: inline-block;
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .question {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 14px;
      line-height: 1.15;
    }

    .explain {
      color: var(--muted);
      line-height: 1.6;
      font-size: 17px;
      max-width: 760px;
      margin-bottom: 28px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 18px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      color: white;
    }

    .yes { background: linear-gradient(135deg, #15803d, var(--green)); }
    .no { background: linear-gradient(135deg, #991b1b, var(--red)); }
    .plain { background: #334155; }
    .gold { background: linear-gradient(135deg, #d97706, var(--gold)); color: #111827; }

    .small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      margin-top: 6px;
      opacity: 0.9;
    }

    .result-title {
      text-align: center;
      margin-bottom: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .model {
      text-align: center;
      font-size: 40px;
      color: var(--gold);
      font-weight: 900;
      margin-bottom: 12px;
    }

    .score {
      text-align: center;
      font-size: 20px;
      margin-bottom: 24px;
    }

    .result-box {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      margin: 18px 0;
    }

    .result-box h3 {
      color: var(--gold);
      margin-top: 0;
    }

    .rank-list {
      display: grid;
      gap: 12px;
    }

    .rank-item {
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
    }

    .rank-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .rank-bar { height: 10px; }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
    }

    .details {
      display: none;
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.55;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .details strong { color: white; }

    .summary {
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 650px) {
      body { padding: 16px; }
      .header { align-items: flex-start; }
      h1 { font-size: 26px; }
      .question { font-size: 24px; }
      .buttons { grid-template-columns: 1fr; }
      .logo { width: 58px; height: 58px; font-size: 19px; }
      .model { font-size: 31px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <img class="logo-img" src="logo.png" alt="IQ2GQ logo">
      <div>
        <h1>IQ2GQ Betting Model Picker</h1>
        <p class="subtitle">Where Intellect Meets Style - answer six questions to find your preferred model.</p>
      </div>
    </div>

    <div class="card">
      <div id="content"></div>
    </div>
  </div>

<script>
const questions = [
  {
    id: "money",
    text: "Should Rule #1 be the main priority?",
    explain: "Rule #1 says we are here to make money. Choose YES if the model should mainly reward profit. Choose NO if the Presidency race, banter and competition matter just as much.",
    yes: "steady",
    no: "competition",
    axis: "money",
    yesText: "YES",
    yesSmall: "Money first",
    noText: "NO",
    noSmall: "Competition matters too"
  },
  {
    id: "steady",
    text: "Should steady return matter more than one big win?",
    explain: "Choose YES if you want to reward members who produce reliable returns over time. Choose NO if the member who makes the most total dollars should simply rank highest.",
    yes: "roi",
    no: "profit",
    axis: "consistency",
    yesText: "YES",
    yesSmall: "Reward consistency",
    noText: "NO",
    noSmall: "Total dollars wins"
  },
  {
    id: "competition",
    text: "Do you want to keep a strong Presidency race?",
    explain: "Choose YES if the model should still feel like a season-long competition. Choose NO if the model should mainly help the Syndicate choose better bets.",
    yes: "simple",
    no: "data",
    axis: "competition",
    yesText: "YES",
    yesSmall: "Keep the race alive",
    noText: "NO",
    noSmall: "Focus on better picks"
  },
  {
    id: "simple",
    text: "Should the system stay easy to understand?",
    explain: "Choose YES if members should understand the ladder quickly. Choose NO if you are open to a smarter ranking system that may need more explanation.",
    yes: "weighted",
    no: "confidence",
    axis: "simple",
    yesText: "YES",
    yesSmall: "Keep it simple",
    noText: "NO",
    noSmall: "Smarter system is fine"
  },
  {
    id: "confidence",
    text: "Should confidence affect the score?",
    explain: "Choose YES if members should be rewarded more for backing strong picks and punished more when those picks fail. Choose NO if you want a rating that adjusts over time based on form and difficulty.",
    yes: "confidenceModel",
    no: "elo",
    axis: "confidence",
    yesText: "YES",
    yesSmall: "Conviction should count",
    noText: "NO",
    noSmall: "Let ratings adjust"
  },
  {
    id: "data",
    text: "Should past data guide weekly picks?",
    explain: "Choose YES if member history by sport, betting type, odds and form should influence picks. Choose NO if you prefer a simple pressure model based on strikes and stand-downs.",
    yes: "ai",
    no: "survivor",
    axis: "data",
    yesText: "YES",
    yesSmall: "Use the data",
    noText: "NO",
    noSmall: "Keep pressure simple"
  }
];

const models = {
  roi: {
    name: "ROI Model",
    short: "Ranks members by return on investment.",
    detail: "The ROI Model rewards members who get the best return for the money placed. It is stronger than total profit because it values efficiency, consistency and smarter risk management.",
    bestFor: "Members who want Rule #1 to matter but do not want one lucky high-odds win to dominate the season.",
    scores: { money: 90, consistency: 95, competition: 55, simple: 65, confidence: 45, data: 75 }
  },
  profit: {
    name: "Profit Model",
    short: "Ranks members by total dollars made.",
    detail: "The Profit Model is the most direct money model. Whoever makes the most money ranks highest. It is easy to understand, but it can be distorted by one big-priced winner.",
    bestFor: "Members who want the simplest Rule #1 model.",
    scores: { money: 98, consistency: 45, competition: 50, simple: 85, confidence: 55, data: 50 }
  },
  weighted: {
    name: "Current Weighted Points",
    short: "Keeps the current points-based Presidency race.",
    detail: "This keeps the current structure: win points, loss points, MM win points, bonus points and penalties. It protects the social competition but does not always reward the most profitable betting.",
    bestFor: "Members who like the current format and want the Presidency race to stay central.",
    scores: { money: 55, consistency: 70, competition: 95, simple: 85, confidence: 45, data: 40 }
  },
  confidenceModel: {
    name: "Confidence Model",
    short: "Members rate how confident they are in each pick.",
    detail: "Members attach a confidence score to their pick. High-confidence wins earn more and high-confidence crashes cost more. It adds strategy but relies on honest self-assessment.",
    bestFor: "Members who want conviction, risk and pressure to matter.",
    scores: { money: 65, consistency: 60, competition: 80, simple: 55, confidence: 98, data: 55 }
  },
  elo: {
    name: "Elo Rating Model",
    short: "A live rating system based on form and difficulty.",
    detail: "Elo works like chess or sport rankings. Members gain or lose rating points based on results, difficulty and form. It gives a better long-term ranking but takes more explanation.",
    bestFor: "Members who want a smarter ladder that updates over time.",
    scores: { money: 65, consistency: 85, competition: 80, simple: 45, confidence: 60, data: 75 }
  },
  ai: {
    name: "AI Performance Model",
    short: "Uses member history to guide better weekly picks.",
    detail: "The AI Performance Model uses past data by member, sport, betting type, odds range and current form. It can recommend where each member has the strongest edge.",
    bestFor: "Members who want the Syndicate to learn from history and improve pick quality.",
    scores: { money: 85, consistency: 85, competition: 55, simple: 35, confidence: 55, data: 98 }
  },
  survivor: {
    name: "Survivor Model",
    short: "Wrong picks create strikes and stand-down pressure.",
    detail: "This is a simple accountability model. Wrong picks earn strikes. Too many strikes lead to a stand-down. It is easy to follow but less useful for measuring betting skill.",
    bestFor: "Members who want pressure and consequences without complex maths.",
    scores: { money: 55, consistency: 55, competition: 75, simple: 90, confidence: 70, data: 35 }
  },
  specialist: {
    name: "Specialist Model",
    short: "Members focus on the sports or bet types they are best at.",
    detail: "The Specialist Model uses member strengths. For example, one member may lead NRL, another NFL, another Super Rugby. This helps reduce weak picks outside a member's proven area.",
    bestFor: "Members who believe everyone should play to their strengths.",
    scores: { money: 80, consistency: 80, competition: 60, simple: 50, confidence: 55, data: 90 }
  },
  performanceIndex: {
    name: "Performance Index",
    short: "One balanced score across several measures.",
    detail: "The Performance Index combines success rate, ROI, profit, MM contribution, current form and risk. It is the most balanced model, but it needs clear rules and good data.",
    bestFor: "Members who want one serious overall measure of performance.",
    scores: { money: 80, consistency: 90, competition: 75, simple: 40, confidence: 60, data: 85 }
  }
};

let current = "money";
let questionNumber = 1;
let userPrefs = {
  money: 50,
  consistency: 50,
  competition: 50,
  simple: 50,
  confidence: 50,
  data: 50
};

function showQuestion(id) {
  current = id;
  const q = questions.find(x => x.id === id);
  const progress = Math.round((questionNumber - 1) / 6 * 100);

  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Question ${questionNumber} of 6</span>
      <span>${progress}% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:${progress}%"></div></div>
    <div class="tag">QUESTION ${questionNumber}</div>
    <div class="question">${q.text}</div>
    <div class="explain">${q.explain}</div>
    <div class="buttons">
      <button class="yes" onclick="answer('${q.yes}', '${q.axis}', 100)">${q.yesText}<span class="small">${q.yesSmall}</span></button>
      <button class="no" onclick="answer('${q.no}', '${q.axis}', 0)">${q.noText}<span class="small">${q.noSmall}</span></button>
    </div>
  `;
}

function answer(next, axis, value) {
  userPrefs[axis] = value;

  if (models[next]) {
    showResult();
  } else {
    questionNumber++;
    showQuestion(next);
  }
}

function modelMatch(model) {
  const axes = Object.keys(userPrefs);
  let total = 0;

  axes.forEach(axis => {
    total += 100 - Math.abs(userPrefs[axis] - model.scores[axis]);
  });

  return Math.round(total / axes.length);
}

function getRankedModels() {
  return Object.keys(models)
    .map(id => ({ id, ...models[id], match: modelMatch(models[id]) }))
    .sort((a, b) => b.match - a.match);
}

function showResult() {
  const ranked = getRankedModels();
  const top = ranked[0];

  const summary = `IQ2GQ Betting Model Picker\n\nMy result: ${top.name}\nMatch: ${top.match}%\n\nWhat it means:\n${top.short}\n\n${top.detail}`;

  const continuum = ranked.map((m, i) => `
    <div class="rank-item" onclick="toggleDetails('${m.id}')">
      <div class="rank-head">
        <span>${i + 1}. ${m.name}</span>
        <span>${m.match}%</span>
      </div>
      <div class="rank-bar"><div class="rank-fill" style="width:${m.match}%"></div></div>
      <div class="pill-row">
        <span class="pill">Money ${m.scores.money}</span>
        <span class="pill">Consistency ${m.scores.consistency}</span>
        <span class="pill">Competition ${m.scores.competition}</span>
        <span class="pill">Simple ${m.scores.simple}</span>
        <span class="pill">Data ${m.scores.data}</span>
      </div>
      <div class="details" id="details-${m.id}">
        <p><strong>What it is:</strong> ${m.detail}</p>
        <p><strong>Best for:</strong> ${m.bestFor}</p>
      </div>
    </div>
  `).join("");

  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Result</span>
      <span>100% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:100%"></div></div>

    <div class="result-title">Your preferred model is</div>
    <div class="model">${top.name}</div>
    <div class="score">${top.match}% match</div>

    <div class="result-box">
      <h3>What this means</h3>
      <p>${top.detail}</p>
      <p><strong>Best for:</strong> ${top.bestFor}</p>
    </div>

    <div class="result-box">
      <h3>All models ranked against your answers</h3>
      <p class="explain">Tap any model below to see what it means and who it suits.</p>
      <div class="rank-list">${continuum}</div>
    </div>

    <div class="result-box">
      <h3>Copy this result for WhatsApp</h3>
      <div class="summary" id="summary">${summary}</div>
    </div>

    <div class="buttons">
      <button class="plain" onclick="restart()">Start again</button>
      <button class="gold" onclick="copyResult()">Copy result</button>
    </div>
  `;
}

function toggleDetails(id) {
  const el = document.getElementById(`details-${id}`);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function restart() {
  questionNumber = 1;
  userPrefs = {
    money: 50,
    consistency: 50,
    competition: 50,
    simple: 50,
    confidence: 50,
    data: 50
  };
  showQuestion("money");
}

function copyResult() {
  const text = document.getElementById("summary").innerText;
  navigator.clipboard.writeText(text);
  alert("Result copied.");
}

showQuestion("money");
</script>
</body>
</html>
