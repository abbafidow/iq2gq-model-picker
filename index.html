<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IQ2GQ Model Finder</title>

  <style>
    :root {
      --bg: #07111f;
      --card: #101c2c;
      --card2: #162337;
      --gold: #fbbf24;
      --text: #f9fafb;
      --muted: #cbd5e1;
      --line: #334155;
      --green: #22c55e;
      --red: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #10233d, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 22px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }

    .centre { text-align: center; }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      color: var(--gold);
    }

    h2 {
      margin-top: 0;
      color: var(--gold);
    }

    .subtitle {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
      max-width: 720px;
      margin: 12px auto 24px;
    }

    .rule {
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 14px;
      border-radius: 999px;
      display: inline-block;
      font-weight: 900;
      margin: 12px 0 24px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #0f172a;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin: 12px 0 28px;
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #fde68a);
      transition: width 0.25s ease;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 14px;
    }

    .question {
      font-size: 32px;
      font-weight: 900;
      margin: 10px 0 16px;
      line-height: 1.15;
    }

    .explain {
      color: var(--muted);
      line-height: 1.6;
      font-size: 17px;
      margin-bottom: 26px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 18px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      color: white;
    }

    .yes { background: linear-gradient(135deg, #15803d, var(--green)); }
    .no { background: linear-gradient(135deg, #991b1b, var(--red)); }
    .goldBtn { background: linear-gradient(135deg, #d97706, var(--gold)); color: #111827; }
    .plain { background: #334155; }

    .small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      margin-top: 6px;
      opacity: 0.9;
    }

    .result-title {
      text-align: center;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .main-result {
      text-align: center;
      font-size: 42px;
      color: var(--gold);
      font-weight: 900;
      margin: 10px 0;
    }

    .score {
      text-align: center;
      font-size: 22px;
      margin-bottom: 24px;
    }

    .result-box {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      margin: 18px 0;
    }

    .rank-list {
      display: grid;
      gap: 12px;
    }

    .rank-item {
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
    }

    .rank-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .rank-bar {
      height: 10px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }

    .rank-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #fde68a);
    }

    .details {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.55;
    }

    .details strong { color: white; }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      font-size: 12px;
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 9px;
    }

    .podium {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin: 18px 0;
    }

    .podium-card {
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .podium-card .icon {
      font-size: 34px;
      margin-bottom: 8px;
    }

    canvas {
      max-width: 100%;
      margin: 0 auto;
      display: block;
    }

    .summary {
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      h1 { font-size: 30px; }
      .question { font-size: 25px; }
      .buttons, .podium { grid-template-columns: 1fr; }
      .main-result { font-size: 30px; }
      .logo { width: 95px; height: 95px; }
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="card" id="content"></div>
</div>

<script>
const questions = [
  {
    id: "money",
    text: "Should Rule #1 be the main priority?",
    explain: "Rule #1 says we are here to make money. Choose YES if the model should mainly reward profit. Choose NO if the Presidency race, banter and competition matter just as much.",
    yes: "steady",
    no: "competition",
    axis: "money",
    yesText: "YES",
    yesSmall: "Money first",
    noText: "NO",
    noSmall: "Competition matters too"
  },
  {
    id: "steady",
    text: "Should steady return matter more than one big win?",
    explain: "Choose YES if you want to reward members who produce reliable returns over time. Choose NO if the member who makes the most total dollars should rank highest.",
    yes: "roi",
    no: "profit",
    axis: "consistency",
    yesText: "YES",
    yesSmall: "Reward consistency",
    noText: "NO",
    noSmall: "Total dollars wins"
  },
  {
    id: "competition",
    text: "Do you want to keep a strong Presidency race?",
    explain: "Choose YES if the model should still feel like a season-long competition. Choose NO if the model should mainly help the Syndicate choose better bets.",
    yes: "simple",
    no: "data",
    axis: "competition",
    yesText: "YES",
    yesSmall: "Keep the race alive",
    noText: "NO",
    noSmall: "Focus on better picks"
  },
  {
    id: "simple",
    text: "Should the system stay easy to understand?",
    explain: "Choose YES if members should understand the ladder quickly. Choose NO if you are open to a smarter ranking system that may need more explanation.",
    yes: "weighted",
    no: "confidence",
    axis: "simple",
    yesText: "YES",
    yesSmall: "Keep it simple",
    noText: "NO",
    noSmall: "Smarter system is fine"
  },
  {
    id: "confidence",
    text: "Should confidence affect the score?",
    explain: "Choose YES if strong picks should earn more and failed confident picks should hurt more. Choose NO if you prefer a rating that adjusts over time.",
    yes: "confidenceModel",
    no: "elo",
    axis: "confidence",
    yesText: "YES",
    yesSmall: "Conviction should count",
    noText: "NO",
    noSmall: "Let ratings adjust"
  },
  {
    id: "data",
    text: "Should past data guide weekly picks?",
    explain: "Choose YES if member history by sport, betting type, odds and form should influence picks. Choose NO if you prefer a simple pressure model.",
    yes: "ai",
    no: "survivor",
    axis: "data",
    yesText: "YES",
    yesSmall: "Use the data",
    noText: "NO",
    noSmall: "Keep pressure simple"
  }
];

const models = {
  roi: {
    icon: "📈",
    name: "ROI Model",
    short: "Ranks members by return on investment.",
    detail: "This rewards members who get the best return for the money placed. It values efficiency, consistency and smarter risk management.",
    bestFor: "Members who want Rule #1 to matter but do not want one lucky high-odds win to dominate the season.",
    scores: { money: 90, consistency: 95, competition: 55, simple: 65, confidence: 45, data: 75 }
  },
  profit: {
    icon: "💰",
    name: "Profit Model",
    short: "Ranks members by total dollars made.",
    detail: "This is the most direct money model. Whoever makes the most money ranks highest. It is simple, but one big win can distort the table.",
    bestFor: "Members who want the simplest Rule #1 model.",
    scores: { money: 98, consistency: 45, competition: 50, simple: 85, confidence: 55, data: 50 }
  },
  weighted: {
    icon: "🏆",
    name: "Current Weighted Points",
    short: "Keeps the current points-based Presidency race.",
    detail: "This keeps win points, loss points, MM points, bonus points and penalties. It protects the social competition but does not always reward the most profitable betting.",
    bestFor: "Members who like the current format and want the Presidency race to stay central.",
    scores: { money: 55, consistency: 70, competition: 95, simple: 85, confidence: 45, data: 40 }
  },
  confidenceModel: {
    icon: "🔥",
    name: "Confidence Model",
    short: "Members rate how confident they are in each pick.",
    detail: "High-confidence wins earn more. High-confidence crashes cost more. It adds strategy but relies on honest judgement.",
    bestFor: "Members who want conviction, pressure and risk to matter.",
    scores: { money: 65, consistency: 60, competition: 80, simple: 55, confidence: 98, data: 55 }
  },
  elo: {
    icon: "♟️",
    name: "Elo Rating Model",
    short: "A live rating system based on form and difficulty.",
    detail: "Elo works like chess or sport rankings. Members gain or lose rating points based on results, difficulty and form.",
    bestFor: "Members who want a smarter ladder that updates over time.",
    scores: { money: 65, consistency: 85, competition: 80, simple: 45, confidence: 60, data: 75 }
  },
  ai: {
    icon: "🤖",
    name: "AI Performance Model",
    short: "Uses member history to guide better weekly picks.",
    detail: "This uses past data by member, sport, betting type, odds range and current form. It helps identify where each member has the strongest edge.",
    bestFor: "Members who want IQ2GQ to learn from history and improve pick quality.",
    scores: { money: 85, consistency: 85, competition: 55, simple: 35, confidence: 55, data: 98 }
  },
  survivor: {
    icon: "⚠️",
    name: "Survivor Model",
    short: "Wrong picks create strikes and stand-down pressure.",
    detail: "Wrong picks earn strikes. Too many strikes lead to a stand-down. It is easy to follow but less useful for measuring betting skill.",
    bestFor: "Members who want pressure and consequences without complex maths.",
    scores: { money: 55, consistency: 55, competition: 75, simple: 90, confidence: 70, data: 35 }
  },
  specialist: {
    icon: "🎯",
    name: "Specialist Model",
    short: "Members focus on the sports or bet types they are best at.",
    detail: "Each member leans into proven strengths. One member may lead NRL, another NFL, another Super Rugby.",
    bestFor: "Members who believe everyone should play to their strengths.",
    scores: { money: 80, consistency: 80, competition: 60, simple: 50, confidence: 55, data: 90 }
  },
  performanceIndex: {
    icon: "⭐",
    name: "Performance Index",
    short: "One balanced score across several measures.",
    detail: "Combines success rate, ROI, profit, MM contribution, form and risk. It is the most balanced option, but needs clean data.",
    bestFor: "Members who want one serious overall measure of performance.",
    scores: { money: 80, consistency: 90, competition: 75, simple: 40, confidence: 60, data: 85 }
  }
};

let questionNumber = 1;
let userPrefs = {
  money: 50,
  consistency: 50,
  competition: 50,
  simple: 50,
  confidence: 50,
  data: 50
};

function start() {
  questionNumber = 1;
  userPrefs = { money: 50, consistency: 50, competition: 50, simple: 50, confidence: 50, data: 50 };
  showQuestion("money");
}

function intro() {
  document.getElementById("content").innerHTML = `
    <div class="centre">
      <img class="logo" src="IQ2GQ%20Logo.png" alt="IQ2GQ Logo">
      <h1>IQ2GQ Model Finder</h1>
      <p class="subtitle">A short assessment to identify which betting model best reflects how you think the Syndicate should operate.</p>
      <div class="rule">Where Intellect Meets Style - Est. 2011</div>
      <p class="subtitle">You will answer six decision questions. At the end you will receive your best model match, a full ranked table, and a model explanation.</p>
      <button class="goldBtn" onclick="start()">Start assessment</button>
    </div>
  `;
}

function showQuestion(id) {
  const q = questions.find(x => x.id === id);
  const progress = Math.round((questionNumber - 1) / 6 * 100);

  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Question ${questionNumber} of 6</span>
      <span>${progress}% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:${progress}%"></div></div>
    <div class="question">${q.text}</div>
    <div class="explain">${q.explain}</div>
    <div class="buttons">
      <button class="yes" onclick="answer('${q.yes}', '${q.axis}', 100)">${q.yesText}<span class="small">${q.yesSmall}</span></button>
      <button class="no" onclick="answer('${q.no}', '${q.axis}', 0)">${q.noText}<span class="small">${q.noSmall}</span></button>
    </div>
  `;
}

function answer(next, axis, value) {
  userPrefs[axis] = value;
  if (models[next]) showResult();
  else {
    questionNumber++;
    showQuestion(next);
  }
}

function modelMatch(model) {
  const axes = Object.keys(userPrefs);
  let total = 0;
  axes.forEach(axis => total += 100 - Math.abs(userPrefs[axis] - model.scores[axis]));
  return Math.round(total / axes.length);
}

function getRankedModels() {
  return Object.keys(models)
    .map(id => ({ id, ...models[id], match: modelMatch(models[id]) }))
    .sort((a, b) => b.match - a.match);
}

function showResult() {
  const ranked = getRankedModels();
  const top = ranked[0];
  const second = ranked[1];
  const third = ranked[2];

  const summary = `IQ2GQ Model Finder\n\nMy result: ${top.name}\nMatch: ${top.match}%\n\n${top.short}\n\n${top.detail}`;

  const table = ranked.map((m, i) => `
    <div class="rank-item" onclick="toggleDetails('${m.id}')">
      <div class="rank-head">
        <span>${i + 1}. ${m.icon} ${m.name}</span>
        <span>${m.match}%</span>
      </div>
      <div class="rank-bar"><div class="rank-fill" style="width:${m.match}%"></div></div>
      <div class="pill-row">
        <span class="pill">Money ${m.scores.money}</span>
        <span class="pill">Consistency ${m.scores.consistency}</span>
        <span class="pill">Competition ${m.scores.competition}</span>
        <span class="pill">Simple ${m.scores.simple}</span>
        <span class="pill">Data ${m.scores.data}</span>
      </div>
      <div class="details" id="details-${m.id}">
        <p><strong>What it is:</strong> ${m.detail}</p>
        <p><strong>Best for:</strong> ${m.bestFor}</p>
      </div>
    </div>
  `).join("");

  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Result</span>
      <span>100% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:100%"></div></div>

    <div class="result-title">Your best match</div>
    <div class="main-result">${top.icon} ${top.name}</div>
    <div class="score">${top.match}% match</div>

    <div class="podium">
      <div class="podium-card"><div class="icon">🥇</div><strong>${top.name}</strong><br>${top.match}%</div>
      <div class="podium-card"><div class="icon">🥈</div><strong>${second.name}</strong><br>${second.match}%</div>
      <div class="podium-card"><div class="icon">🥉</div><strong>${third.name}</strong><br>${third.match}%</div>
    </div>

    <div class="result-box">
      <h2>What this means</h2>
      <p>${top.detail}</p>
      <p><strong>Best for:</strong> ${top.bestFor}</p>
    </div>

    <div class="result-box">
      <h2>Your preference profile</h2>
      <canvas id="radar" width="520" height="420"></canvas>
    </div>

    <div class="result-box">
      <h2>All models ranked</h2>
      <p class="explain">Tap any model to see what it means and who it suits.</p>
      <div class="rank-list">${table}</div>
    </div>

    <div class="result-box">
      <h2>AGM-style recommendation</h2>
      <p>Do not treat this as a binding vote. Use it to guide discussion. If most members cluster around data-led models, IQ2GQ should consider keeping the current Presidency competition while using AI, ROI or Performance Index scoring to support better weekly betting decisions.</p>
    </div>

    <div class="result-box">
      <h2>Copy this result</h2>
      <div class="summary" id="summary">${summary}</div>
    </div>

    <div class="buttons">
      <button class="plain" onclick="intro()">Start again</button>
      <button class="goldBtn" onclick="copyResult()">Copy result</button>
    </div>
  `;

  drawRadar(top);
}

function drawRadar(top) {
  const canvas = document.getElementById("radar");
  const ctx = canvas.getContext("2d");
  const axes = ["money", "consistency", "competition", "simple", "data"];
  const labels = ["Profit", "Consistency", "Competition", "Simplicity", "Data"];
  const cx = canvas.width / 2;
  const cy = canvas.height / 2 + 10;
  const radius = 145;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#334155";
  ctx.fillStyle = "#cbd5e1";
  ctx.lineWidth = 1;

  for (let ring = 1; ring <= 5; ring++) {
    ctx.beginPath();
    axes.forEach((axis, i) => {
      const angle = -Math.PI / 2 + (i * 2 * Math.PI / axes.length);
      const r = radius * ring / 5;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.stroke();
  }

  axes.forEach((axis, i) => {
    const angle = -Math.PI / 2 + (i * 2 * Math.PI / axes.length);
    const x = cx + Math.cos(angle) * (radius + 45);
    const y = cy + Math.sin(angle) * (radius + 45);
    ctx.fillText(labels[i], x - 35, y);
  });

  drawShape(axes.map(a => userPrefs[a]), "rgba(251,191,36,0.35)", "#fbbf24");
  drawShape(axes.map(a => top.scores[a]), "rgba(148,163,184,0.15)", "#94a3b8");
}

function drawShape(values, fill, stroke) {
  const canvas = document.getElementById("radar");
  const ctx = canvas.getContext("2d");
  const axes = values.length;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2 + 10;
  const radius = 145;

  ctx.beginPath();
  values.forEach((value, i) => {
    const angle = -Math.PI / 2 + (i * 2 * Math.PI / axes);
    const r = radius * value / 100;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 3;
  ctx.stroke();
}

function toggleDetails(id) {
  const el = document.getElementById(`details-${id}`);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function copyResult() {
  const text = document.getElementById("summary").innerText;
  navigator.clipboard.writeText(text);
  alert("Result copied.");
}

intro();
</script>
</body>
</html>
