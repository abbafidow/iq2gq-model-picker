<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IQ2GQ 2027 Competition Designer</title>

  <style>
    :root {
      --bg: #07111f;
      --card: #101c2c;
      --card2: #162337;
      --gold: #fbbf24;
      --text: #f9fafb;
      --muted: #cbd5e1;
      --line: #334155;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #10233d, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 22px;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }

    .centre { text-align: center; }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      color: var(--gold);
    }

    h2 {
      margin-top: 0;
      color: var(--gold);
    }

    h3 {
      color: var(--gold);
      margin-top: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
      max-width: 760px;
      margin: 12px auto 24px;
    }

    .rule {
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 14px;
      border-radius: 999px;
      display: inline-block;
      font-weight: 900;
      margin: 12px 0 24px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 14px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #0f172a;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin: 12px 0 28px;
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #fde68a);
      transition: width 0.25s ease;
    }

    .stage {
      display: inline-block;
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 18px;
    }

    .question {
      font-size: 32px;
      font-weight: 900;
      margin: 10px 0 16px;
      line-height: 1.15;
    }

    .explain {
      color: var(--muted);
      line-height: 1.6;
      font-size: 17px;
      margin-bottom: 26px;
    }

    .buttons, .choice-grid, .podium {
      display: grid;
      gap: 16px;
    }

    .buttons {
      grid-template-columns: 1fr 1fr;
    }

    .choice-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .podium {
      grid-template-columns: repeat(3, 1fr);
    }

    button, .choice-card {
      border: 0;
      border-radius: 18px;
      padding: 18px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      color: white;
    }

    .choice-card {
      background: #0f172a;
      border: 1px solid var(--line);
      text-align: left;
      position: relative;
    }

    .choice-card:hover {
      border-color: var(--gold);
    }

    .choice-icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .choice-title {
      font-size: 21px;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .choice-text {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.45;
      font-weight: 400;
    }

    .ribbon {
      position: absolute;
      right: 14px;
      top: 14px;
      font-size: 12px;
      color: #111827;
      background: var(--gold);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .yes { background: linear-gradient(135deg, #15803d, var(--green)); }
    .no { background: linear-gradient(135deg, #991b1b, var(--red)); }
    .goldBtn { background: linear-gradient(135deg, #d97706, var(--gold)); color: #111827; }
    .plain { background: #334155; }

    .small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      margin-top: 6px;
      opacity: 0.9;
    }

    .result-title {
      text-align: center;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .main-result {
      text-align: center;
      font-size: 40px;
      color: var(--gold);
      font-weight: 900;
      margin: 10px 0;
    }

    .score {
      text-align: center;
      font-size: 22px;
      margin-bottom: 24px;
    }

    .result-box {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      margin: 18px 0;
    }

    .rank-list {
      display: grid;
      gap: 12px;
    }

    .rank-item {
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
    }

    .rank-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .rank-bar, .profile-bar {
      height: 10px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }

    .rank-fill, .profile-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #fde68a);
    }

    .details {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.55;
    }

    .details strong { color: white; }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      font-size: 12px;
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 9px;
    }

    .podium-card {
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .podium-card .icon {
      font-size: 34px;
      margin-bottom: 8px;
    }

    .profile-row {
      margin: 14px 0;
    }

    .profile-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
      font-weight: 900;
    }

    canvas {
      max-width: 100%;
      margin: 0 auto;
      display: block;
    }

    .summary {
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 750px) {
      h1 { font-size: 30px; }
      .question { font-size: 25px; }
      .buttons, .choice-grid, .podium { grid-template-columns: 1fr; }
      .main-result { font-size: 30px; }
      .logo { width: 95px; height: 95px; }
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="card" id="content"></div>
</div>

<script>
const structures = {
  team: {
    icon: "👥",
    name: "Team Multi Competition",
    short: "Teams of 3-4. Everyone must be correct for the team multi to pay out.",
    detail: "Best for camaraderie, banter, shared wins and shared blame. This is closest to the current IQ2GQ model."
  },
  individual: {
    icon: "👤",
    name: "Individual Competition",
    short: "Every member competes on their own performance.",
    detail: "Best for profit models, ROI and identifying the strongest bettor without relying on teammates."
  },
  matchplay: {
    icon: "⛳",
    name: "Match Play Competition",
    short: "Members face weekly head-to-head match ups.",
    detail: "Best for rivalry, weekly drama and a Ryder Cup style season narrative."
  },
  hybrid: {
    icon: "⚖️",
    name: "Hybrid Competition",
    short: "One pick contributes to individual, team and syndicate outcomes.",
    detail: "Best if IQ2GQ wants to preserve the social competition while adding smarter data-led betting."
  }

const questions = [
  {
    id: "money",
    text: "Should Rule #1 be the main priority?",
    explain: "Rule #1 says we are here to make money. Choose YES if the model should mainly reward profit. Choose NO if the Presidency race, banter and competition matter just as much.",
    yes: "steady", no: "competition", axis: "money",
    yesText: "YES", yesSmall: "Money first", noText: "NO", noSmall: "Competition matters too"
  },
  {
    id: "steady",
    text: "Should steady return matter more than one big win?",
    explain: "Choose YES if you want to reward members who produce reliable returns over time. Choose NO if the member who makes the most total dollars should rank highest.",
    yes: "process", no: "wildcard", axis: "consistency",
    yesText: "YES", yesSmall: "Reward consistency", noText: "NO", noSmall: "Total dollars wins"
  },
  {
    id: "competition",
    text: "Do you want to keep a strong Presidency race?",
    explain: "Choose YES if the model should still feel like a season-long competition. Choose NO if the model should mainly help the Syndicate choose better bets.",
    yes: "simple", no: "data", axis: "competition",
    yesText: "YES", yesSmall: "Keep the race alive", noText: "NO", noSmall: "Focus on better picks"
  },
  {
    id: "simple",
    text: "Should the system stay easy to understand?",
    explain: "Choose YES if members should understand the ladder quickly. Choose NO if you are open to a smarter ranking system that may need more explanation.",
    yes: "equal", no: "confidence", axis: "simple",
    yesText: "YES", yesSmall: "Keep it simple", noText: "NO", noSmall: "Smarter system is fine"
  },
  {
    id: "confidence",
    text: "Should confidence affect the score?",
    explain: "Choose YES if strong picks should earn more and failed confident picks should hurt more. Choose NO if you prefer a rating that adjusts over time.",
    yes: "equal", no: "evolve", axis: "confidence",
    yesText: "YES", yesSmall: "Conviction should count", noText: "NO", noSmall: "Let ratings adjust"
  },
  {
    id: "data",
    text: "Should past data guide weekly picks?",
    explain: "Choose YES if member history by sport, betting type, odds and form should influence picks. Choose NO if you prefer a simple pressure model.",
    yes: "equal", no: "accountability", axis: "data",
    yesText: "YES", yesSmall: "Use the data", noText: "NO", noSmall: "Keep pressure simple"
  },
  {
    id: "process",
    text: "Should good betting decisions be rewarded even when the bet loses?",
    explain: "Choose YES if the model should reward sound process, such as beating the market or making a strong value pick. Choose NO if only actual wins should count.",
    yes: "equal", no: "wildcard", axis: "process",
    yesText: "YES", yesSmall: "Reward good decisions", noText: "NO", noSmall: "Only wins count"
  },
  {
    id: "equal",
    text: "Should every member have equal influence each week?",
    explain: "Choose YES if everyone should have the same influence. Choose NO if members with stronger historical results should carry more weight.",
    yes: "teamwork", no: "evolve", axis: "equalInfluence",
    yesText: "YES", yesSmall: "One member, one vote", noText: "NO", noSmall: "Performance should matter"
  },
  {
    id: "teamwork",
    text: "Should the model reward team success more than individual excellence?",
    explain: "Choose YES if team wins should remain central. Choose NO if the best individual bettor should be recognised most.",
    yes: "accountability", no: "wildcard", axis: "teamwork",
    yesText: "YES", yesSmall: "Team first", noText: "NO", noSmall: "Individual first"
  },
  {
    id: "evolve",
    text: "Should the model improve as more data becomes available?",
    explain: "Choose YES if the system should learn over time. Choose NO if the rules should stay fixed and predictable each season.",
    yes: "accountability", no: "wildcard", axis: "innovation",
    yesText: "YES", yesSmall: "Let it evolve", noText: "NO", noSmall: "Keep rules fixed"
  },
  {
    id: "accountability",
    text: "Should repeated failed weeks reduce a member's role?",
    explain: "Choose YES if repeated crashes should trigger stand-downs or reduced influence. Choose NO if every member should keep contributing regardless of form.",
    yes: "wildcard", no: "wildcard", axis: "accountability",
    yesText: "YES", yesSmall: "Consequences matter", noText: "NO", noSmall: "Keep everyone involved"
  }
];

const models = {
  roi: {
    icon: "📈", name: "ROI Model",
    short: "Ranks members by return on investment.",
    detail: "Rewards members who get the best return for the money placed. It values efficiency, consistency and smart risk management.",
    bestFor: "Members who want Rule #1 to matter but do not want one lucky high-odds win to dominate the season.",
    scores: { money: 92, consistency: 96, competition: 50, simple: 65, confidence: 45, data: 80, process: 75, equalInfluence: 40, teamwork: 40, innovation: 75, accountability: 80 }
  },
  profit: {
    icon: "💰", name: "Profit Model",
    short: "Ranks members by total dollars made.",
    detail: "The most direct money model. Whoever makes the most money ranks highest. Simple, but one big win can distort the table.",
    bestFor: "Members who want the simplest Rule #1 model.",
    scores: { money: 98, consistency: 40, competition: 45, simple: 85, confidence: 55, data: 50, process: 35, equalInfluence: 55, teamwork: 25, innovation: 45, accountability: 70 }
  },
  weighted: {
    icon: "🏆", name: "Current Weighted Points",
    short: "Keeps the current points-based Presidency race.",
    detail: "Keeps win points, loss points, MM points, bonus points and penalties. Protects the social competition but does not always reward profitability.",
    bestFor: "Members who like the current format and want the Presidency race to stay central.",
    scores: { money: 55, consistency: 70, competition: 96, simple: 86, confidence: 45, data: 40, process: 40, equalInfluence: 85, teamwork: 80, innovation: 35, accountability: 65 }
  },
  confidenceModel: {
    icon: "🔥", name: "Confidence Model",
    short: "Members rate how confident they are in each pick.",
    detail: "High-confidence wins earn more. High-confidence crashes cost more. Adds strategy but relies on honest judgement.",
    bestFor: "Members who want conviction, pressure and risk to matter.",
    scores: { money: 65, consistency: 60, competition: 82, simple: 55, confidence: 98, data: 55, process: 65, equalInfluence: 70, teamwork: 65, innovation: 55, accountability: 85 }
  },
  elo: {
    icon: "♟️", name: "Elo Rating Model",
    short: "A live rating system based on form and difficulty.",
    detail: "Works like chess or sports rankings. Members gain or lose rating points based on results, difficulty and form.",
    bestFor: "Members who want a smarter ladder that updates over time.",
    scores: { money: 65, consistency: 85, competition: 82, simple: 45, confidence: 60, data: 78, process: 70, equalInfluence: 35, teamwork: 40, innovation: 85, accountability: 75 }
  },
  ai: {
    icon: "🤖", name: "AI Performance Model",
    short: "Uses member history to guide better weekly picks.",
    detail: "Uses past data by member, sport, betting type, odds range and current form. Helps identify where each member has the strongest edge.",
    bestFor: "Members who want IQ2GQ to learn from history and improve pick quality.",
    scores: { money: 88, consistency: 88, competition: 55, simple: 30, confidence: 55, data: 99, process: 90, equalInfluence: 20, teamwork: 55, innovation: 98, accountability: 85 }
  },
  survivor: {
    icon: "⚠️", name: "Survivor Model",
    short: "Wrong picks create strikes and stand-down pressure.",
    detail: "Wrong picks earn strikes. Too many strikes lead to a stand-down. Easy to follow but less useful for measuring betting skill.",
    bestFor: "Members who want pressure and consequences without complex maths.",
    scores: { money: 55, consistency: 55, competition: 75, simple: 92, confidence: 70, data: 35, process: 35, equalInfluence: 90, teamwork: 60, innovation: 35, accountability: 98 }
  },
  specialist: {
    icon: "🎯", name: "Specialist Model",
    short: "Members focus on the sports or bet types they are best at.",
    detail: "Each member leans into proven strengths. One member may lead NRL, another NFL, another Super Rugby.",
    bestFor: "Members who believe everyone should play to their strengths.",
    scores: { money: 82, consistency: 82, competition: 60, simple: 50, confidence: 55, data: 92, process: 85, equalInfluence: 20, teamwork: 75, innovation: 85, accountability: 85 }
  },
  performanceIndex: {
    icon: "⭐", name: "Performance Index",
    short: "One balanced score across several measures.",
    detail: "Combines success rate, ROI, profit, MM contribution, form and risk. Balanced but needs clean data.",
    bestFor: "Members who want one serious overall measure of performance.",
    scores: { money: 82, consistency: 92, competition: 75, simple: 40, confidence: 60, data: 88, process: 85, equalInfluence: 35, teamwork: 65, innovation: 88, accountability: 88 }
  }
};

let questionNumber = 1;
let selectedStructure = null;
let userPrefs = {};

const defaultPrefs = {
  money: 50, consistency: 50, competition: 50, simple: 50, confidence: 50,
  data: 50, process: 50, equalInfluence: 50, teamwork: 50, innovation: 50, accountability: 50
};

function intro() {
  document.getElementById("content").innerHTML = `
    <div class="centre">
      <img class="logo" src="IQ2GQ%20Logo.png" alt="IQ2GQ Logo">
      <h1>IQ2GQ 2027 Competition Designer</h1>
      <p class="subtitle">Designing the next chapter of the Syndicate. This tool identifies your preferred competition structure, scoring model and betting philosophy.</p>
      <div class="rule">Where Intellect Meets Style - Est. 2011</div>
      <p class="subtitle">This is not a binding vote. It is designed to support a better AGM discussion.</p>
      <button class="goldBtn" onclick="chooseStructure()">Start assessment</button>
    </div>
  `;
}

function chooseStructure() {
  const cards = Object.keys(structures).map(id => {
    const s = structures[id];
    const ribbon = id === "hybrid" ? `<div class="ribbon">Recommended</div>` : "";
    return `
      <div class="choice-card" onclick="selectStructure('${id}')">
        ${ribbon}
        <div class="choice-icon">${s.icon}</div>
        <div class="choice-title">${s.name}</div>
        <div class="choice-text">${s.short}<br><br>${s.detail}</div>
      </div>
    `;
  }).join("");

  document.getElementById("content").innerHTML = `
    <div class="stage">STAGE ONE - COMPETITION STRUCTURE</div>
    <div class="question">How should IQ2GQ be played?</div>
    <div class="explain">Choose the structure you prefer before answering the betting philosophy questions.</div>
    <div class="choice-grid">${cards}</div>
  `;
}

function selectStructure(id) {
  selectedStructure = id;
  questionNumber = 1;
  userPrefs = { ...defaultPrefs };

  if (id === "team") {
    userPrefs.teamwork = 90;
    userPrefs.competition = 85;
  }

  if (id === "individual") {
    userPrefs.money = 85;
    userPrefs.teamwork = 20;
    userPrefs.competition = 55;
  }

  if (id === "matchplay") {
    userPrefs.competition = 95;
    userPrefs.accountability = 85;
    userPrefs.simple = 75;
  }

  if (id === "hybrid") {
    userPrefs.money = 80;
    userPrefs.competition = 80;
    userPrefs.data = 85;
    userPrefs.teamwork = 70;
    userPrefs.innovation = 85;
  }

  showQuestion("money");
}

function showQuestion(id) {
  const q = questions.find(x => x.id === id);
  const total = 11;
  const progress = Math.round((questionNumber - 1) / total * 100);

  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Question ${questionNumber} of ${total}</span>
      <span>${progress}% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:${progress}%"></div></div>
    <div class="stage">STAGE TWO - BETTING PHILOSOPHY</div>
    <div class="question">${q.text}</div>
    <div class="explain">${q.explain}</div>
    <div class="buttons">
      <button class="yes" onclick="answer('${q.yes}', '${q.axis}', 100)">${q.yesText}<span class="small">${q.yesSmall}</span></button>
      <button class="no" onclick="answer('${q.no}', '${q.axis}', 0)">${q.noText}<span class="small">${q.noSmall}</span></button>
    </div>
  `;
}

function answer(next, axis, value) {
  userPrefs[axis] = value;

  if (next === "wildcard") {
    showWildcard();
  } else {
    questionNumber++;
    showQuestion(next);
  }
}

function showWildcard() {
  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Final question</span>
      <span>95% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:95%"></div></div>
    <div class="stage">FINAL SCENARIO</div>
    <div class="question">Who had the better season?</div>
    <div class="explain">
      Member A wins 80% of bets, average odds $1.35, and makes $220 profit.<br><br>
      Member B wins 55% of bets, average odds $2.70, and makes $950 profit.
    </div>
    <div class="choice-grid">
      <div class="choice-card" onclick="wildcard('a')">
        <div class="choice-icon">📊</div>
        <div class="choice-title">Member A</div>
        <div class="choice-text">Consistency and high strike rate matter most.</div>
      </div>
      <div class="choice-card" onclick="wildcard('b')">
        <div class="choice-icon">💰</div>
        <div class="choice-title">Member B</div>
        <div class="choice-text">Profit matters most, even with more losses.</div>
      </div>
      <div class="choice-card" onclick="wildcard('neither')">
        <div class="choice-icon">⚖️</div>
        <div class="choice-title">Neither</div>
        <div class="choice-text">There should be a more balanced way to judge performance.</div>
      </div>
    </div>
  `;
}

function wildcard(choice) {
  if (choice === "a") {
    userPrefs.consistency = 100;
    userPrefs.money = Math.max(userPrefs.money, 65);
  }

  if (choice === "b") {
    userPrefs.money = 100;
    userPrefs.consistency = Math.min(userPrefs.consistency, 45);
  }

  if (choice === "neither") {
    userPrefs.data = 90;
    userPrefs.process = 90;
    userPrefs.innovation = 85;
  }

  showResult();
}

function modelMatch(model) {
  const axes = Object.keys(defaultPrefs);
  let total = 0;
  axes.forEach(axis => total += 100 - Math.abs(userPrefs[axis] - model.scores[axis]));
  return Math.round(total / axes.length);
}

function getRankedModels() {
  return Object.keys(models)
    .map(id => ({ id, ...models[id], match: modelMatch(models[id]) }))
    .sort((a, b) => b.match - a.match);
}

function getProfile() {
  return {
    "Profit orientation": Math.round((userPrefs.money + userPrefs.consistency) / 2),
    "Competition focus": userPrefs.competition,
    "Data and innovation": Math.round((userPrefs.data + userPrefs.innovation) / 2),
    "Simplicity": userPrefs.simple,
    "Teamwork": userPrefs.teamwork,
    "Accountability": userPrefs.accountability
  };
}

function showResult() {
  const ranked = getRankedModels();
  const top = ranked[0];
  const second = ranked[1];
  const third = ranked[2];
  const structure = structures[selectedStructure];
  const profile = getProfile();

  const profileHtml = Object.keys(profile).map(key => `
    <div class="profile-row">
      <div class="profile-head"><span>${key}</span><span>${profile[key]}%</span></div>
      <div class="profile-bar"><div class="profile-fill" style="width:${profile[key]}%"></div></div>
    </div>
  `).join("");

  const table = ranked.map((m, i) => `
    <div class="rank-item" onclick="toggleDetails('${m.id}')">
      <div class="rank-head">
        <span>${i + 1}. ${m.icon} ${m.name}</span>
        <span>${m.match}%</span>
      </div>
      <div class="rank-bar"><div class="rank-fill" style="width:${m.match}%"></div></div>
      <div class="pill-row">
        <span class="pill">Money ${m.scores.money}</span>
        <span class="pill">Consistency ${m.scores.consistency}</span>
        <span class="pill">Competition ${m.scores.competition}</span>
        <span class="pill">Simple ${m.scores.simple}</span>
        <span class="pill">Data ${m.scores.data}</span>
      </div>
      <div class="details" id="details-${m.id}">
        <p><strong>What it is:</strong> ${m.detail}</p>
        <p><strong>Best for:</strong> ${m.bestFor}</p>
      </div>
    </div>
  `).join("");

  const summary = `IQ2GQ 2027 Competition Designer\n\nCompetition structure: ${structure.name}\nScoring model: ${top.name}\nMatch: ${top.match}%\n\n${top.short}\n\nRecommendation: Keep the AGM discussion focused on structure first, then scoring model, then weekly betting process.`;

  document.getElementById("content").innerHTML = `
    <div class="progress-top">
      <span>Result</span>
      <span>100% complete</span>
    </div>
    <div class="bar"><div class="fill" style="width:100%"></div></div>

    <div class="result-title">Your preferred competition structure</div>
    <div class="main-result">${structure.icon} ${structure.name}</div>
    <div class="score">${structure.short}</div>

    <div class="result-title">Your best scoring model</div>
    <div class="main-result">${top.icon} ${top.name}</div>
    <div class="score">${top.match}% match</div>

    <div class="podium">
      <div class="podium-card"><div class="icon">🥇</div><strong>${top.name}</strong><br>${top.match}%</div>
      <div class="podium-card"><div class="icon">🥈</div><strong>${second.name}</strong><br>${second.match}%</div>
      <div class="podium-card"><div class="icon">🥉</div><strong>${third.name}</strong><br>${third.match}%</div>
    </div>

    <div class="result-box">
      <h2>Betting philosophy profile</h2>
      ${profileHtml}
    </div>

    <div class="result-box">
      <h2>Your preference profile</h2>
      <canvas id="radar" width="520" height="420"></canvas>
    </div>

    <div class="result-box">
      <h2>All models ranked</h2>
      <p class="explain">Tap any model to see what it means and who it suits.</p>
      <div class="rank-list">${table}</div>
    </div>

    <div class="result-box">
      <h2>AGM-style recommendation</h2>
      <p>Start with the competition structure first. If the group prefers ${structure.name}, the next decision is whether the scoring model should be ${top.name}, ${second.name}, or a hybrid of both.</p>
      <p>If most members cluster around data-led models, IQ2GQ should consider keeping the social competition while using AI, ROI or Performance Index scoring to support better weekly betting decisions.</p>
    </div>

    <div class="result-box">
      <h2>Copy this result</h2>
      <div class="summary" id="summary">${summary}</div>
    </div>

    <div class="buttons">
      <button class="plain" onclick="intro()">Start again</button>
      <button class="goldBtn" onclick="copyResult()">Copy result</button>
    </div>
  `;

  drawRadar(top);
}

function drawRadar(top) {
  const canvas = document.getElementById("radar");
  const ctx = canvas.getContext("2d");
  const axes = ["money", "consistency", "competition", "simple", "data"];
  const labels = ["Profit", "Consistency", "Competition", "Simplicity", "Data"];
  const cx = canvas.width / 2;
  const cy = canvas.height / 2 + 10;
  const radius = 145;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#334155";
  ctx.fillStyle = "#cbd5e1";
  ctx.lineWidth = 1;

  for (let ring = 1; ring <= 5; ring++) {
    ctx.beginPath();
    axes.forEach((axis, i) => {
      const angle = -Math.PI / 2 + (i * 2 * Math.PI / axes.length);
      const r = radius * ring / 5;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.stroke();
  }

  axes.forEach((axis, i) => {
    const angle = -Math.PI / 2 + (i * 2 * Math.PI / axes.length);
    const x = cx + Math.cos(angle) * (radius + 45);
    const y = cy + Math.sin(angle) * (radius + 45);
    ctx.fillText(labels[i], x - 35, y);
  });

  drawShape(axes.map(a => userPrefs[a]), "rgba(251,191,36,0.35)", "#fbbf24");
  drawShape(axes.map(a => top.scores[a]), "rgba(148,163,184,0.15)", "#94a3b8");
}

function drawShape(values, fill, stroke) {
  const canvas = document.getElementById("radar");
  const ctx = canvas.getContext("2d");
  const axes = values.length;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2 + 10;
  const radius = 145;

  ctx.beginPath();
  values.forEach((value, i) => {
    const angle = -Math.PI / 2 + (i * 2 * Math.PI / axes);
    const r = radius * value / 100;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 3;
  ctx.stroke();
}

function toggleDetails(id) {
  const el = document.getElementById(`details-${id}`);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function copyResult() {
  const text = document.getElementById("summary").innerText;
  navigator.clipboard.writeText(text);
  alert("Result copied.");
}

intro();
</script>
